// ═══════════════════════════════════════════════════════════════════════
//  EMAIL ENGINE — Microsoft Graph + EmailJS + mailto fallback
// ═══════════════════════════════════════════════════════════════════════

// ── Hard-coded credentials — FILL THESE IN for auto-send to work ──────
// Get these from: portal.azure.com → App registrations → your app
const MS_CLIENT_ID = 'YOUR_AZURE_APP_CLIENT_ID_HERE';  // e.g. 'a1b2c3d4-...-xxxx'
const MS_TENANT_ID = 'YOUR_AZURE_TENANT_ID_HERE';      // e.g. 'xyz123.onmicrosoft.com' or specific tenant GUID
const EJS_SERVICE_ID  = ''; // paste EmailJS Service ID here (optional fallback)
const EJS_TEMPLATE_ID = ''; // paste EmailJS Template ID here
const EJS_PUBLIC_KEY  = ''; // paste EmailJS Public Key here

// ── Config helpers ─────────────────────────────────────────────────────
function getEmailConfig(){
  // Always prefer what is explicitly saved in localStorage by the user
  const savedClientId = localStorage.getItem('ms_client_id');
  const savedTenantId = localStorage.getItem('ms_tenant_id');
  // Only fall back to hardcoded constants if nothing is saved at all (null = never saved)
  const clientId = (savedClientId !== null) ? savedClientId : MS_CLIENT_ID;
  const tenantId = (savedTenantId !== null) ? savedTenantId : MS_TENANT_ID;
  // Strip only the original placeholder strings — never strip user-entered values
  const cleanId  = (clientId  && clientId.trim()  && clientId.trim()  !== 'YOUR_AZURE_APP_CLIENT_ID_HERE') ? clientId.trim()  : '';
  const cleanTen = (tenantId  && tenantId.trim()  && tenantId.trim()  !== 'YOUR_AZURE_TENANT_ID_HERE')      ? tenantId.trim()  : '';
  return {
    clientId:  cleanId,
    tenantId:  cleanTen,
    ejsService:  localStorage.getItem('ejs_service_id')  || EJS_SERVICE_ID,
    ejsTemplate: localStorage.getItem('ejs_template_id') || EJS_TEMPLATE_ID,
    ejsKey:      localStorage.getItem('ejs_public_key')  || EJS_PUBLIC_KEY,
  };
}
function emailTransport(){
  const c = getEmailConfig();
  if(c.clientId && c.tenantId)   return 'msgraph';
  if(c.ejsService && c.ejsTemplate && c.ejsKey) return 'emailjs';
  return 'mailto';
}

// ── Timeout wrapper ────────────────────────────────────────────────────
function withTimeout(promise, ms=18000){
  return Promise.race([promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),ms))]);
}

// ══════════════════════════════════════════════════════════════════════
//  MSAL (Microsoft Graph) — Singleton pattern (ported from Legal app)
//
//  KEY FIXES vs old implementation:
//  1. Singleton cache keyed by clientId+tenantId — prevents token-cache
//     conflicts and "interaction_in_progress" errors from multiple instances
//  2. await inst.initialize() — required for correct MSAL v2 operation
//  3. Short-form scopes ['Mail.Send','User.Read'] — more reliable than full URLs
//  4. CDN changed to unpkg + jsDelivr fallback (alcdn.msauth.net was unreliable)
//  5. _msalSignedIn state tracked via singleton accounts check, not a flag
//     that gets wiped when settings are saved
// ══════════════════════════════════════════════════════════════════════

// Singleton cache: one MSAL instance per clientId+tenantId pair.
// Never recreated on credential save — preserves cached tokens.
const _msalInstances = {};

/**
 * getMSGraphToken(cfg)
 * Acquires a delegated Mail.Send token via silent→popup flow.
 * cfg = { clientId, tenantId }  (from getEmailConfig())
 */
async function getMSGraphToken(cfg) {
  if (typeof msal === 'undefined') {
    throw new Error(
      'MS_LOAD_ERROR: MSAL library failed to load. Check your internet connection and refresh. ' +
      'If the problem persists, ensure your network allows access to unpkg.com or cdn.jsdelivr.net.'
    );
  }
  if (!cfg.clientId || !cfg.tenantId) {
    throw new Error('MS_NOT_CONFIGURED: Enter your Azure Client ID & Tenant ID in Settings → Email Integration, then save.');
  }

  // Redirect URI: full page URL, no hash/query — must match Azure AD App Registration exactly
  const redirectUri = window.location.href.split('?')[0].split('#')[0];
  const cacheKey    = `${cfg.clientId}::${cfg.tenantId}`;

  if (!_msalInstances[cacheKey]) {
    const inst = new msal.PublicClientApplication({
      auth: {
        clientId:    cfg.clientId,
        authority:   `https://login.microsoftonline.com/${cfg.tenantId}`,
        redirectUri,
      },
      cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false },
    });
    // initialize() is required in MSAL v2 before any interactive calls
    await inst.initialize();
    _msalInstances[cacheKey] = inst;
    console.log(`🔑 [MSAL] Instance created — redirectUri: ${redirectUri}`);
  }

  const inst    = _msalInstances[cacheKey];
  const request = { scopes: ['Mail.Send', 'User.Read'] };
  const accounts = inst.getAllAccounts();

  // Silent first (uses cached token — no popup)
  if (accounts.length > 0) {
    try {
      const silent = await inst.acquireTokenSilent({ ...request, account: accounts[0] });
      return silent.accessToken;
    } catch (_) { /* token expired or interaction required — fall through to popup */ }
  }

  // Interactive popup login
  const popup = await inst.loginPopup(request);
  return popup.accessToken;
}

/**
 * getMsalInstance()
 * Returns the cached MSAL instance for the current credentials, or null.
 * Used by the Settings UI status badge.
 */
function getMsalInstance() {
  const c = getEmailConfig();
  if (!c.clientId || !c.tenantId) return null;
  return _msalInstances[`${c.clientId}::${c.tenantId}`] || null;
}

let _msalSignedIn = false;

function updateMsalStatusBadge(state, username=''){
  const dot = document.getElementById('msal-status-dot');
  const lbl = document.getElementById('msal-status-label');
  const btn = document.getElementById('msal-signin-btn');
  if(!dot) return;
  if(state === 'signed-in'){
    dot.style.background = 'var(--green)';
    dot.style.boxShadow  = '0 0 6px var(--green)';
    if(lbl) lbl.textContent = '✅ Signed in as: ' + username;
    if(btn){ btn.textContent = '⎋ Sign Out'; btn.onclick = msalSignOut; }
    _msalSignedIn = true;
  } else {
    dot.style.background = 'var(--amber)';
    dot.style.boxShadow  = '0 0 6px var(--amber)';
    if(lbl) lbl.textContent = '⚠ Not signed in — click "Sign In with Microsoft" to authorize';
    if(btn){ btn.textContent = '🔑 Sign In with Microsoft'; btn.onclick = msalSignIn; }
    _msalSignedIn = false;
  }
}

async function msalSignIn(){
  const c = getEmailConfig();
  if(!c.clientId || !c.tenantId){
    toast('Enter and save your Azure Client ID & Tenant ID in Settings first','var(--amber)');
    return;
  }
  const btn = document.getElementById('msal-signin-btn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Opening Microsoft login…'; }
  try{
    const token = await getMSGraphToken(c);
    if(token){
      const inst     = getMsalInstance();
      const accounts = inst ? inst.getAllAccounts() : [];
      const username = accounts.length ? accounts[0].username : c.clientId;
      updateMsalStatusBadge('signed-in', username);
      toast('✅ Signed in to Microsoft — emails will send automatically');
    }
  }catch(e){
    console.error('[MSAL] Sign-in error:', e.message);
    const isFileProtocol = window.location.protocol === 'file:';
    const hint = isFileProtocol ? ' — Note: Microsoft sign-in requires the page to be served over HTTPS, not opened as a local file.' : '';
    toast('Sign-in failed: ' + e.message.replace('MS_NOT_CONFIGURED: ','') + hint, 'var(--red)');
  }finally{
    if(btn){ btn.disabled=false; }
  }
}

async function msalSignOut(){
  const inst = getMsalInstance();
  if(!inst){ updateMsalStatusBadge('signed-out'); toast('Signed out from Microsoft'); return; }
  try{
    const accounts = inst.getAllAccounts();
    if(accounts.length > 0){
      // Clear token cache locally — avoid full redirect sign-out (which reloads the page)
      await inst.clearCache();
    }
  }catch(e){
    console.warn('[MSAL] Sign-out error:', e.message);
  }
  _msalSignedIn = false;
  updateMsalStatusBadge('signed-out');
  toast('Signed out from Microsoft');
}

/**
 * getMsAccessToken()
 * Used internally by sendViaMsGraph and notification functions.
 */
async function getMsAccessToken(){
  const c = getEmailConfig();
  if(!c.clientId || !c.tenantId){
    throw new Error('MS_NOT_CONFIGURED: Enter your Azure Client ID & Tenant ID in Settings → Email Integration');
  }
  try{
    return await getMSGraphToken(c);
  }catch(e){
    if(e.message && (e.message.includes('interaction_required') || e.message.includes('login_required') || e.message.includes('consent_required'))){
      throw new Error('MS_NOT_SIGNED_IN: Session expired — go to Settings → Email Integration and click "Sign In with Microsoft" to re-authorize.');
    }
    if(e.message && e.message.startsWith('MS_')){
      throw e; // already formatted
    }
    throw new Error('MS_NOT_SIGNED_IN: Microsoft auth failed: ' + e.message);
  }
}

/**
 * handleMsalRedirect()
 * Called on page load — checks for cached sign-in and updates status badge.
 */
async function handleMsalRedirect(){
  const c = getEmailConfig();
  if(!c.clientId || !c.tenantId) return;
  try{
    // Warm up singleton instance to pick up any cached token
    const cacheKey = `${c.clientId}::${c.tenantId}`;
    if(!_msalInstances[cacheKey]){
      const redirectUri = window.location.href.split('?')[0].split('#')[0];
      const inst = new msal.PublicClientApplication({
        auth:{ clientId:c.clientId, authority:`https://login.microsoftonline.com/${c.tenantId}`, redirectUri },
        cache:{ cacheLocation:'localStorage', storeAuthStateInCookie:false },
      });
      await inst.initialize();
      _msalInstances[cacheKey] = inst;
    }
    const inst     = _msalInstances[cacheKey];
    const accounts = inst.getAllAccounts();
    if(accounts.length > 0){
      _msalSignedIn = true;
      updateMsalStatusBadge('signed-in', accounts[0].username);
      console.log('[MSAL] Restored cached sign-in:', accounts[0].username);
    } else {
      updateMsalStatusBadge('signed-out');
    }
  }catch(e){
    console.warn('[MSAL] Startup check error:', e.message);
  }
}

function applyTplVars(text, task, changeDetail){
  if(!text) return text;
  return text
    .replace(/{{task_title}}/g, task.title||'')
    .replace(/{{assignee}}/g,   (task.assignee||'').split('@')[0])
    .replace(/{{due_date}}/g,   fmt(task.due)||'—')
    .replace(/{{priority}}/g,   task.priority||'')
    .replace(/{{status}}/g,     task.status||'')
    .replace(/{{change_detail}}/g, changeDetail||'');
}

function buildEmailSubject(reason, taskTitle, task){
  const tplCfg = getTplConfig(reason);
  if(tplCfg && tplCfg.subject){
    return applyTplVars(tplCfg.subject, task||{title:taskTitle,assignee:'',priority:'',status:'',due:''}, '');

  const pfx = '[POLYPLASTICS Tasks]';
  const lbl = REASON_LABEL[reason] || reason;
  return `${pfx} ${lbl}: ${taskTitle}`;
}

// ── Microsoft Graph send ───────────────────────────────────────────────
async function sendViaMsGraph(toEmail, subject, htmlBody){
  const cfg = getEmailConfig();
  // getMSGraphToken handles all cases: not configured, not signed in, token refresh
  const token = await withTimeout(getMSGraphToken(cfg));
  const res = await withTimeout(fetch('https://graph.microsoft.com/v1.0/me/sendMail',{
    method:'POST',
    headers:{ Authorization:'Bearer '+token, 'Content-Type':'application/json' },
    body: JSON.stringify({
      message:{
        subject,
        body:{ contentType:'HTML', content:htmlBody },
        toRecipients:[{ emailAddress:{ address:toEmail } }]
      },
      saveToSentItems: false
    })
  }));
  if(!res.ok){ const err=await res.text(); throw new Error('Graph '+res.status+': '+err); }
  return true;
}

// ── EmailJS send ───────────────────────────────────────────────────────
async function sendViaEmailJS(toEmail, subject, htmlBody, task){
  const c = getEmailConfig();
  if(typeof emailjs === 'undefined') throw new Error('EmailJS library not loaded');
  emailjs.init({ publicKey: c.ejsKey });
  const params = {
    to_email:   toEmail,
    to_name:    toEmail.split('@')[0],
    subject:    subject,
    message_html: htmlBody,
    task_title: task.title||'',
    task_due:   fmt(task.due)||'',
    task_priority: task.priority||'',
    task_status: task.status||'',
    task_desc:  task.desc||'',
    task_assignee: task.assignee||'',
    reply_to:   'noreply@polyplastics.com',
    from_name:  'POLYPLASTICS Task Manager',
  };
  const r = await withTimeout(emailjs.send(c.ejsService, c.ejsTemplate, params));
  if(r.status !== 200) throw new Error('EmailJS: '+r.text);
  return true;
}

// ── Unified send function ──────────────────────────────────────────────
async function sendTaskEmail(task, reason='assigned', extra={}){
  const transport = emailTransport();
  if(transport === 'mailto') return false; // handled separately
  const taskLink = window.location.href.split('?')[0]+'?email='+encodeURIComponent(task.assignee);
  const subject  = buildEmailSubject(reason, task.title, task);
  const htmlBody = buildEmailHtml(task, reason, taskLink, extra.changeDetail||'');
  // Let errors propagate so callers can distinguish the failure type
  if(transport === 'msgraph'){
    await sendViaMsGraph(task.assignee, subject, htmlBody);
  } else if(transport === 'emailjs'){
    await sendViaEmailJS(task.assignee, subject, htmlBody, task);
  }
  return true;
}

// ── Central dispatcher ─────────────────────────────────────────────────
async function notifyAssignee(task, reason, extra={}){
  const transport = emailTransport();
  const taskLink = window.location.href.split('?')[0]+'?email='+encodeURIComponent(task.assignee);
  if(transport !== 'mailto'){
    try{
      const ok = await sendTaskEmail(task, reason, extra);
      if(ok){
        toast('📧 Email sent to '+task.assignee+' via '+(transport==='msgraph'?'Microsoft 365':'EmailJS'));
        return;
      }
    }catch(e){
      const msg = e.message || '';
      if(msg.includes('MS_NOT_SIGNED_IN')){
        toast('⚠ Microsoft not signed in — go to Settings → Email Integration → Sign In','var(--amber)');
        return;
      } else if(msg.includes('MS_NOT_CONFIGURED')){
        toast('⚠ Microsoft not configured — enter Client ID & Tenant ID in Settings','var(--amber)');
        return;
      }
      console.warn('[notifyAssignee]', transport, msg);
      toast('⚠ Email failed — falling back to mail client','var(--amber)');
    }
  }
  openMailtoFallback(task, taskLink, reason, extra.changeDetail||'');
}

function plantOwnerLogin(){
  const plantId = document.getElementById('plant-login-select').value;
  const entered = document.getElementById('plant-pwd-input').value;
  const err = document.getElementById('plant-login-error');

  if(!plantId || !entered){ err.style.display='block'; return; }

  const groups = getPlantGroups();
  const plant = groups.find(p=>p.id===plantId);
  if(!plant){ err.style.display='block'; return; }

  const doLogin = (storedPwd) => {
    if(!storedPwd || entered !== storedPwd){
      err.style.display='block';
      document.getElementById('plant-pwd-input').value='';
      return;
    }
    err.style.display='none';
    plantOwnerAuthenticated = true;
    adminAuthenticated = false;
    currentPlantSession = plant;
    _activePlantId = plant.id;
    document.body.classList.add('plant-owner-mode');

    // Show admin-nav so plant nav items are visible, but hide top-level admin items
    document.getElementById('admin-nav').style.display = 'block';
    document.getElementById('btn-new-task').style.display = 'flex';
    document.getElementById('btn-bulk-upload').style.display = 'flex';
    document.getElementById('btn-export').style.display = 'flex';
    document.getElementById('btn-admin-mode').style.display = 'none';
    document.getElementById('btn-user-mode').style.display = 'none';
    const sidebarBottom = document.querySelector('.sidebar-bottom');
    if(sidebarBottom){ sidebarBottom.style.display=''; sidebarBottom.style.visibility=''; }

    // Update topbar avatar
    const avatar = document.getElementById('topbar-avatar');
    if(avatar){ avatar.textContent = plant.name[0].toUpperCase(); avatar.style.background='linear-gradient(135deg,var(--green),var(--cyan))'; }
    document.getElementById('topbar-title').textContent = '🏭 '+plant.name;

    toast('Welcome, '+plant.name+' Owner! 🏭');
    renderPlantNav();
    showPlantPanel(plant.id);
  };

  // Check Firestore first, fall back to localStorage
  const localPwd = plant.password || '';
  if(_fbReady && _db){
    _db.collection('settings').doc('plantGroups').get().then(d=>{
      if(d.exists && d.data().plants){
        const fbPlant = d.data().plants.find(p=>p.id===plantId);
        doLogin(fbPlant?.password || localPwd);
      } else {
        doLogin(localPwd);
      }
    }).catch(()=>doLogin(localPwd));
  } else {
    doLogin(localPwd);
  }
}

// ── Helper: get tasks scoped to current session ───────────────────────
function getScopedTasks(){
  if(!plantOwnerAuthenticated || !currentPlantSession) return tasks;
  const owners = (currentPlantSession.owners||[]).map(o=>o.toLowerCase());
  return tasks.filter(t =>
    owners.includes((t.assignee||'').toLowerCase()) ||
    (t.plant && t.plant === currentPlantSession.id)
  );
}

// ── mailto email (zero-config fallback) ──────────────────────────────
function sendMailtoEmail(taskId){
  const t=getTask(taskId);
  if(!t){toast('Task not found','var(--red)');return;}
  const taskLink=window.location.href.split('?')[0]+'?email='+encodeURIComponent(t.assignee);
  const cfg=getEmailConfig();
  // Try Microsoft Graph first if configured
  if(cfg.clientId&&cfg.tenantId){
    sendTaskEmail(t,'assigned').then(ok=>{
      if(ok) toast('📧 Email sent via Microsoft to '+t.assignee+'!');
      else openMailtoFallback(t,taskLink);
    }).catch(e=>{
      const msg=e.message||'';
      if(msg.includes('MS_NOT_SIGNED_IN')){
        toast('⚠ Not signed in to Microsoft — go to Settings → Email Integration → Sign In','var(--amber)');
      } else {
        openMailtoFallback(t,taskLink);
      }
    });
    return;
  }
  // Fallback: open mail client
  openMailtoFallback(t, taskLink, 'assigned');
}

function openMailtoFallback(t, taskLink, reason, changeDetail){
  reason=reason||'assigned';
  changeDetail=changeDetail||'';
  const subjectMap={
    assigned:        '[POLYPLASTICS] Task Assigned: '+t.title,
    updated:         '[POLYPLASTICS] Task Updated: '+t.title,
    date_change:     '[POLYPLASTICS] Due Date Changed: '+t.title,
    priority_change: '[POLYPLASTICS] Priority Changed: '+t.title,
    status_change:   '[POLYPLASTICS] Status Changed: '+t.title,
    reminder:        '[POLYPLASTICS] Reminder: '+t.title,
  };
  const introMap={
    assigned:        'A task has been assigned to you.',
    updated:         'A task assigned to you has been updated.',
    date_change:     'The due date of your task has been changed.',
    priority_change: 'The priority of your task has been changed.',
    status_change:   'The status of your task has been changed.',
    reminder:        'This is a reminder about your pending task.',
  };
  const subject=encodeURIComponent(subjectMap[reason]||subjectMap.assigned);
  const changeBlock=changeDetail?'🔄 Change:     '+changeDetail+'\n':'';
  const body=encodeURIComponent(
`Hi ${t.assignee.split('@')[0]},

${introMap[reason]||introMap.assigned}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📌 Task:      ${t.title}
${changeBlock}📅 Due Date:  ${fmt(t.due)}
⚡ Priority:  ${t.priority}
📊 Status:    ${t.status}
🔔 Reminder:  ${t.reminder}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${t.desc?'📝 Description:\n'+t.desc+'\n\n':''}
🔗 Click to view your tasks (no account needed):
${taskLink}

Regards,
POLYPLASTICS Task Manager`
  );
  window.open('mailto:'+t.assignee+'?subject='+subject+'&body='+body);
  toast('📧 Mail client opened for '+t.assignee);
}

async function sendAllReminders(){
  const cfg=getEmailConfig();
  if(!cfg.clientId||!cfg.tenantId){
    toast('Configure Microsoft Graph in Settings first','var(--amber)');
    return;
  }
  // Check sign-in before looping
  const inst=getMsalInstance();
  if(!inst||!inst.getAllAccounts().length){
    toast('⚠ Not signed in to Microsoft — go to Settings → Email Integration → Sign In','var(--amber)');
    return;
  }
  const active=tasks.filter(t=>t.reminder&&t.reminder!=='none'&&t.status!=='Done');
  if(!active.length){toast('No active reminders to send','var(--amber)');return;}
  toast('Sending '+active.length+' reminder emails…','var(--accent)');
  let sent=0,failed=0;
  for(const t of active){
    try{
      const ok=await sendTaskEmail(t,'reminder');
      if(ok) sent++; else failed++;
    }catch(e){ failed++; console.warn('reminder send error',t.title,e.message); }
  }
  if(failed===0) toast(`✅ All ${sent} reminder emails sent!`);
  else toast(`Sent ${sent}/${active.length} emails. ${failed} failed — check console.`,'var(--amber)');
}

function exportData(){
  const blob=new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='taskflow-backup.json'; a.click();

}

function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const fr=new FileReader(); fr.onload=ev=>{
      try{
        const imported=JSON.parse(ev.target.result);
        if(!Array.isArray(imported)){toast('Invalid format: expected an array of tasks','var(--red)');return;}
        tasks=imported;
        localStorage.setItem('tf_tasks',JSON.stringify(tasks));
        if(_fbReady&&_db){
          const batch=_db.batch();
          tasks.forEach(t=>batch.set(_db.collection('tasks').doc(t.id),t));
          batch.commit().catch(e=>console.warn('importData batch error',e));
        }
        showPanel('dashboard'); toast('Tasks imported successfully!');
      }catch{toast('Invalid JSON file — could not parse','var(--red)');}
    };fr.readAsText(e.target.files[0]);
  };inp.click();
}

function resetData(){
  if(!confirm('Reset all tasks to demo data? This cannot be undone.'))return;
  tasks=JSON.parse(JSON.stringify(SEED)).map(t=>({...t,id:uid(),token:uid()}));
  localStorage.setItem('tf_tasks',JSON.stringify(tasks));
  if(_fbReady&&_db){
    // Clear existing docs then write fresh
    _db.collection('tasks').get().then(snap=>{
      const batch=_db.batch();
      snap.docs.forEach(d=>batch.delete(d.ref));
      tasks.forEach(t=>batch.set(_db.collection('tasks').doc(t.id),t));
      batch.commit().catch(e=>console.warn('resetData batch error',e));
    });
  }
  showPanel('dashboard'); toast('Reset to demo data');
}

      <div class="stat-card" style="--c:var(--green)"><div class="stat-icon">✅</div><div class="stat-value">${done}</div><div class="stat-label">Completed</div></div>
      <div class="stat-card" style="--c:var(--red)"><div class="stat-icon">🚨</div><div class="stat-value">${overdue}</div><div class="stat-label">Overdue</div></div>

    </div>

function openUserTaskDetail(id){
  // Always fetch fresh from tasks array — never use a stale reference
  const fresh=tasks.find(t=>t.id===id);
  if(!fresh){toast('Task not found','var(--red)');return;}
  userTask=fresh;
  renderUserTask(document.getElementById('content'));
}

// ── User: email task details to themselves ────────────────────────────
function sendUserTaskEmail(taskId){
  const t=tasks.find(x=>x.id===taskId);
  if(!t){toast('Task not found','var(--red)');return;}
  const cfg=getEmailConfig();
  const taskLink=window.location.href.split('?')[0]+'?email='+encodeURIComponent(t.assignee);
  // Try Microsoft Graph if configured
  if(cfg.clientId&&cfg.tenantId){
    sendTaskEmail(t,'reminder').then(ok=>{
      if(ok) toast('📧 Task details emailed to '+t.assignee+'!');
      else openUserMailtoFallback(t,taskLink);
    }).catch(e=>{
      const msg=e.message||'';
      if(msg.includes('MS_NOT_SIGNED_IN')){
        toast('⚠ Microsoft not signed in — opening mail client instead','var(--amber)');
        openUserMailtoFallback(t,taskLink);
      } else {
        openUserMailtoFallback(t,taskLink);
      }
    });
    return;
  }
  openUserMailtoFallback(t,taskLink);
}

function openUserMailtoFallback(t,taskLink){
  const subject=encodeURIComponent('[POLYPLASTICS] Your Task: '+t.title);
  const overdueNote=isOverdue(t)?'\n⚠️  This task is OVERDUE — please update your status.\n':'';
  const body=encodeURIComponent(
`Hi ${t.assignee.split('@')[0]},

Here are the details for your assigned task on POLYPLASTICS Task Manager.
${overdueNote}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📌 Task:      ${t.title}
📅 Due Date:  ${fmt(t.due)}
⚡ Priority:  ${t.priority}
📊 Status:    ${t.status}
🔔 Reminder:  ${t.reminder}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${t.desc?'📝 Description:\n'+t.desc+'\n\n':''}🏷 Tags: ${t.tags&&t.tags.length?t.tags.join(', '):'None'}

🔗 View your tasks (no account needed):
${taskLink}

Regards,
POLYPLASTICS Task Manager`
  );
  window.open('mailto:'+t.assignee+'?subject='+subject+'&body='+body);
  toast('📧 Mail client opened — sending task details to '+t.assignee);
}

function userUpdateStatus(s){
  if(!userTask)return;
  const completedDate = s==='Done' ? today() : (s!=='Done' ? '' : userTask.completedDate);
  userTask={...userTask,status:s,completedDate};
  updateTask(userTask);
  toast('Status updated to: '+s);
  renderUserTask(document.getElementById('content'));
}

function handleUserFiles(input){
  const files=Array.from(input.files);
  pendingFiles=[...pendingFiles,...files];
  document.getElementById('user-file-list').innerHTML=pendingFiles.map((f,i)=>
    `<div class="attach-chip">📎 ${f.name} <span style="cursor:pointer;color:var(--red);margin-left:4px" onclick="removePendingFile(${i})">✕</span></div>`
  ).join('');
}

function removePendingFile(i){
  pendingFiles.splice(i,1);
  const listEl=document.getElementById('user-file-list');
  if(listEl) listEl.innerHTML=pendingFiles.map((f,idx)=>
    `<div class="attach-chip">📎 ${f.name} <span style="cursor:pointer;color:var(--red);margin-left:4px" onclick="removePendingFile(${idx})">✕</span></div>`
  ).join('');
}

function submitUserReply(){
  const text=document.getElementById('user-reply-text').value.trim();
  if(!text&&pendingFiles.length===0){toast('Please write a reply or attach a file','var(--amber)');return;}
  const reply={
    id:uid(),
    author:userTask.assignee,
    text,
    time:new Date().toISOString(),
    attachments:pendingFiles.map(f=>({name:f.name,size:f.size,type:f.type}))
  };
  userTask={...userTask,replies:[...userTask.replies,reply]};
  updateTask(userTask);
  addNotification(userTask.id, userTask.title, reply.author, reply.text||'(attachment)');
  pendingFiles=[];
  toast('Reply submitted successfully!');
  renderUserTask(document.getElementById('content'));
}

function openDrawer(id){
  activeDrawerTask=getTask(id);
  const overlay=document.createElement('div');
  overlay.className='drawer-overlay'; overlay.id='drawer-overlay';
  overlay.onclick=closeDrawer;
  const drawer=document.createElement('div');
  drawer.className='drawer'; drawer.id='task-drawer';
  document.body.appendChild(overlay);
  document.body.appendChild(drawer);
  renderDrawerContent();
}

function closeDrawer(){
  document.getElementById('drawer-overlay')?.remove();
  document.getElementById('task-drawer')?.remove();
  activeDrawerTask=null;
  pendingFiles=[];
  // Safely refresh current panel
  const taskRows=document.getElementById('task-rows');
  if(currentPanel==='tasks'&&taskRows) renderTaskRows();
  else if(currentPanel==='kanban') renderKanban();
  else if(currentPanel==='dashboard') renderDashboard();
}

function changeAdminPassword(){
  const current=document.getElementById('pwd-current').value;
  const newPwd=document.getElementById('pwd-new').value;
  const confirm=document.getElementById('pwd-confirm').value;
  const stored=localStorage.getItem('admin_password')||'';
  const statusEl=document.getElementById('pwd-status');
  if(current!==stored){statusEl.style.color='var(--red)';statusEl.textContent='❌ Current password is incorrect';return;}
  if(newPwd.length<6){statusEl.style.color='var(--red)';statusEl.textContent='❌ New password must be at least 6 characters';return;}
  if(newPwd!==confirm){statusEl.style.color='var(--red)';statusEl.textContent='❌ Passwords do not match';return;}
  localStorage.setItem('admin_password',newPwd);
  if(_fbReady&&_db) _db.collection('settings').doc('admin').set({password:newPwd},{merge:true}).catch(e=>console.warn('pwd save error',e));
  statusEl.style.color='var(--green)';statusEl.textContent='✅ Password updated successfully';
  document.getElementById('pwd-current').value='';
  document.getElementById('pwd-new').value='';
  document.getElementById('pwd-confirm').value='';
  toast('Admin password updated!');
}

function editFromDrawer(id){
  closeDrawer();
  setTimeout(()=>{ editTaskId=id; openTaskModal(); },50);
}

function deleteTaskFromDrawer(id){
  if(!confirm('Delete this task permanently? This cannot be undone.'))return;
  tasks=tasks.filter(t=>t.id!==id);
  localStorage.setItem('tf_tasks',JSON.stringify(tasks));
  if(_fbReady&&_db) _db.collection('tasks').doc(id).delete().catch(e=>console.warn('delete error',e));
  refreshOverdueBadge();
  closeDrawer();
  toast('Task deleted','var(--red)');
  showPanel(currentPanel);
}

function changeDrawerStatus(s){
  const prev=activeDrawerTask.status;
  const completedDate = s==='Done' ? today() : (s!=='Done' && activeDrawerTask.completedDate ? '' : activeDrawerTask.completedDate);
  activeDrawerTask={...activeDrawerTask,status:s,completedDate};
  updateTask(activeDrawerTask);
  renderDrawerContent();
  refreshOverdueBadge();
  // Notify assignee of the status change
  if(s!==prev){
    const reason = s==='Done' ? 'completed' : 'status_change';
    const detail = s==='Done'
      ? 'Task completed on '+fmt(today())
      : 'Status → '+s+' (was '+prev+')';
    notifyAssignee(activeDrawerTask, reason, {changeDetail: detail}).catch(e=>console.warn('notify status change error',e.message));
  }
}

function handleDrawerFiles(input){
  const files=Array.from(input.files);

function submitDrawerReply(){

  if(!text&&pendingFiles.length===0){toast('Please write a reply or attach a file','var(--amber)');return;}
  const reply={id:uid(),author:'Admin',text,time:new Date().toISOString(),attachments:pendingFiles.map(f=>({name:f.name,size:f.size}))};
  activeDrawerTask={...activeDrawerTask,replies:[...activeDrawerTask.replies,reply]};

function saveTask(){
  const title=document.getElementById('tm-title')?.value.trim();
  const assignee=document.getElementById('tm-assignee')?.value.trim();
  const due=document.getElementById('tm-due')?.value;
  if(!title||!assignee||!due){toast('Title, email & due date are required','var(--red)');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(assignee)){toast('Please enter a valid email address','var(--red)');return;}

  try{
    const tags=document.getElementById('tm-tags').value.split(',').map(s=>s.trim()).filter(Boolean);

    if(editTaskId){
      const t=getTask(editTaskId);
      if(!t){ toast('Task not found — it may have been deleted.','var(--red)'); closeTaskModal(); return; }
      const newPriority=document.getElementById('tm-priority').value;
      const newStatus=document.getElementById('tm-status').value;
      const updated={...t,title,desc:document.getElementById('tm-desc').value,assignee,priority:newPriority,status:newStatus,due,completedDate:document.getElementById('tm-completedDate')?.value||t.completedDate||'',reminder:document.getElementById('tm-reminder').value,tags};
      updateTask(updated);
      // close modal & refresh UI immediately
      closeTaskModal(); refreshOverdueBadge(); showPanel(currentPanel);
      // notify assignee of what changed
      const changes=[];
      if(assignee!==t.assignee)    changes.push({reason:'assigned',      detail:'Reassigned to '+assignee});
      if(due!==t.due)              changes.push({reason:'date_change',   detail:'Due date → '+fmt(due)});
      if(newPriority!==t.priority) changes.push({reason:'priority_change',detail:'Priority → '+newPriority});
      if(newStatus!==t.status){
        const reason = newStatus==='Done' ? 'completed' : 'status_change';
        const detail = newStatus==='Done' ? 'Task completed on '+fmt(today()) : 'Status → '+newStatus;
        changes.push({reason, detail});
      }
      if(changes.length===0 && (title!==t.title||document.getElementById('tm-desc')?.value!==t.desc))
        changes.push({reason:'updated', detail:'Task details updated'});
      // Fire all notifications in background — do not await, prevents UI hang
      changes.forEach(({reason,detail})=>{ notifyAssignee(updated, reason, {changeDetail:detail}).catch(e=>console.warn('notify error',e)); });
      if(changes.length===0) toast('Task updated (no changes to notify).');

    } else {
      const nt={
        id:uid(), title,
        desc:document.getElementById('tm-desc').value,
        assignee,
        priority:document.getElementById('tm-priority').value,
        status:document.getElementById('tm-status').value,
        due, created:today(), token:uid(),
        completedDate:document.getElementById('tm-completedDate')?.value||(document.getElementById('tm-status')?.value==='Done'?today():''),
        replies:[], attachments:[],
        reminder:document.getElementById('tm-reminder').value,
        tags,
        ...(plantOwnerAuthenticated&&currentPlantSession ? {plant: currentPlantSession.id} : {})
      };
      tasks=[nt,...tasks];
      localStorage.setItem('tf_tasks',JSON.stringify(tasks));
      // Strip undefined fields before sending to Firestore (Firestore rejects undefined)
      const ntClean = Object.fromEntries(Object.entries(nt).filter(([,v])=>v!==undefined));
      if(_fbReady&&_db) _db.collection('tasks').doc(ntClean.id).set(ntClean).catch(e=>console.warn('addTask error',e));

      // Close modal & refresh UI FIRST — emails run in background after render
      closeTaskModal(); refreshOverdueBadge(); showPanel(currentPanel);

      setTimeout(()=>{
        const cfg=getEmailConfig();
        if(cfg.clientId&&cfg.tenantId){
          // Send to assignee (fire and forget — no await)
          sendTaskEmail(nt,'assigned').then(ok=>{
            if(ok) toast('\u2705 Task created & email sent to '+assignee+'!');
            else   toast('Task created! Email failed — check Microsoft Graph settings.','var(--amber)');
          }).catch(e=>{
            const msg = e.message || '';
            if(msg.includes('MS_NOT_SIGNED_IN')){
              toast('Task created! ⚠ Sign in to Microsoft (Settings → Email Integration) to send emails.','var(--amber)');
            } else if(msg.includes('MS_NOT_CONFIGURED')){
              toast('Task created! ⚠ Configure Microsoft credentials in Settings to send emails.','var(--amber)');
            } else {
              console.warn('sendTaskEmail error:',e);
              toast('Task created! Email error: '+msg.slice(0,60),'var(--amber)');
            }
          });
          // Notify admin (fire and forget — no await, no hang)
          sendAdminTaskCreationEmail(nt).catch(e=>console.warn('admin email error:',e));
        } else {
          toast('\u2705 Task created for '+assignee+'!');
          try{
            const taskLink=window.location.href.split('?')[0]+'?email='+encodeURIComponent(nt.assignee);
            openMailtoFallback(nt,taskLink);
          }catch(mailErr){ console.warn('mailto fallback failed:',mailErr); }
        }
      }, 100); // small delay ensures UI is fully rendered before network calls
    }
  }catch(err){
    console.error('saveTask error:',err);
    toast('Error saving task: '+err.message,'var(--red)');
  }
}

function fallbackEmailLogin(){

function checkUrlToken(){
  const params=new URLSearchParams(window.location.search);
  const token=params.get('token');
  const emailParam=params.get('email');

  // Support ?email=assignee@example.com links (direct assignee access)
  if(emailParam){
    const decoded=decodeURIComponent(emailParam).trim();
    if(decoded){
      // Store with original case for display, but matching is always lowercase
      userEmail=decoded;
      mode='user';
      return; // init block handles rendering — no admin login
    }
  }

  if(token){
    // Match token against tasks — also try case-insensitive token match as fallback
    const found=tasks.find(t=>t.token===token) || tasks.find(t=>t.token&&t.token.toLowerCase()===token.toLowerCase());
    if(found){
      userEmail=found.assignee;
      userTask=found;
      mode='user'; // set before init block runs — prevents admin login screen
      return;
    }
    // Token not found in localStorage — could be stale link.
    // Try to extract email from the task list by checking all tokens via a scan.
    // As last resort, show a "link expired" message — handled in init block via mode still being 'admin'
  }
}

function filterMyTasks(filter){
  // Determine current email
  let selfEmail;
  if(plantOwnerAuthenticated && currentPlantSession){
    selfEmail = (currentPlantSession.owners||[])[0] || '';
  } else {
    selfEmail = mode==='user' ? (userEmail||'') : (localStorage.getItem('self_email')||'');
  }
  // Update the filter label pill
  const lbl = document.getElementById('mytasks-filter-label');
  const PILL_CONFIG = {
    'all':         {text:'All',          bg:'rgba(91,141,238,.12)',   color:'var(--accent)'},
    'To Do':       {text:'To Do',        bg:'rgba(156,163,176,.12)', color:'var(--text2)'},
    'In Progress': {text:'In Progress',  bg:'rgba(34,211,238,.12)',  color:'var(--cyan)'},
    'Review':      {text:'Review',       bg:'rgba(167,139,250,.15)', color:'var(--purple)'},
    'Done':        {text:'Done',         bg:'rgba(52,211,153,.13)',  color:'var(--green)'},
    'overdue':     {text:'Overdue',      bg:'rgba(248,113,113,.15)', color:'var(--red)'},
  };
  if(lbl){
    const cfg = PILL_CONFIG[filter] || PILL_CONFIG['all'];
    lbl.textContent = cfg.text;
    lbl.style.background = cfg.bg;
    lbl.style.color = cfg.color;
  }
  renderMyTaskList(selfEmail, filter);
}

function renderMyTaskList(selfEmail, filter='all'){
  const el=document.getElementById('my-task-list');
  if(!el) return;

  // Gather all tasks for this user
  let allMyT;
  if(plantOwnerAuthenticated && currentPlantSession){
    const ownerEmails=(currentPlantSession.owners||[]).map(o=>o.toLowerCase());
    allMyT = tasks.filter(t=>ownerEmails.includes((t.assignee||'').toLowerCase()));
  } else {
    allMyT = tasks.filter(t=>t.assignee.toLowerCase()===(selfEmail||'').toLowerCase());
  }

  // Apply filter
  let filtered;
  if(filter==='overdue')       filtered = allMyT.filter(t=>isOverdue(t));
  else if(filter==='all')      filtered = allMyT;
  else                         filtered = allMyT.filter(t=>t.status===filter);

  // Sort: overdue first, then by status order, then by due date
  filtered = [...filtered].sort((a,b)=>{
    const ao=isOverdue(a)?0:(['To Do','In Progress','Review','Done'].indexOf(a.status)+1||9);
    const bo=isOverdue(b)?0:(['To Do','In Progress','Review','Done'].indexOf(b.status)+1||9);
    return ao-bo||(a.due||'').localeCompare(b.due||'');
  });

  if(!filtered.length){
    const emptyMsgs = {
      'all':'No tasks assigned to you yet. Click <strong>+ Add My Task</strong> to create one.',
      'To Do':'No To Do tasks — you\'re all caught up! 🎉',
      'In Progress':'No tasks currently in progress.',
      'Review':'No tasks pending review.',
      'Done':'No completed tasks yet. Keep going! 💪',
      'overdue':'No overdue tasks — great work! ✅',
    };
    el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3);">${emptyMsgs[filter]||'No tasks match this filter.'}</div>`;
    return;
  }

  const STATUS_COL={'To Do':'var(--text3)','In Progress':'var(--cyan)','Review':'var(--purple)','Done':'var(--green)'};
  const isPlantOwner = plantOwnerAuthenticated && currentPlantSession;

  el.innerHTML=filtered.map(t=>{
    const ov=isOverdue(t);
    const col=ov?'var(--red)':(STATUS_COL[t.status]||'var(--text3)');
    return `<div class="task-row" style="border-left:3px solid ${col};cursor:pointer" onclick="openDrawer('${t.id}')">
      <div class="task-row-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          <span style="color:${col};font-weight:600;">${ov?'⚠ OVERDUE':t.status}</span>
          ${isPlantOwner?`<span>👤 ${esc(t.assignee)}</span>`:''}
          <span>📅 <span style="color:${ov?'var(--red)':'inherit'}">${fmt(t.due)}</span></span>
          <span>${(PRIO_ICONS&&PRIO_ICONS[t.priority])||''} ${t.priority}</span>
          ${t.completedDate?`<span style="color:var(--green);font-weight:600">✅ ${fmt(t.completedDate)}</span>`:''}
          ${t.tags&&t.tags.length?`<span>🏷 ${t.tags.join(', ')}</span>`:''}
        </div>
      </div>
      <div class="task-actions" onclick="event.stopPropagation()">
        ${!isPlantOwner?`<button class="btn btn-ghost btn-sm" title="Edit" onclick="openSelfTaskModal('${t.id}')">✏</button>`:''}
        <button class="btn btn-ghost btn-sm" style="color:var(--cyan)" title="Next status" onclick="quickStatusCycle('${t.id}')">▶</button>
        <button class="btn btn-ghost btn-sm" onclick="openDrawer('${t.id}')">👁</button>
        ${!isPlantOwner?`<button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteMyTask('${t.id}')">🗑</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function quickStatusCycle(id){
  const t=getTask(id); if(!t) return;
  const cycle=['To Do','In Progress','Review','Done'];
  const next=cycle[(cycle.indexOf(t.status)+1)%cycle.length];
  const completedDate = next==='Done' ? today() : '';
  updateTask({...t,status:next,completedDate});
  toast('Status → '+next);
  // Re-render task list preserving current filter
  const lbl = document.getElementById('mytasks-filter-label');
  const LABEL_TO_FILTER = {'All':'all','To Do':'To Do','In Progress':'In Progress','Review':'Review','Done':'Done','Overdue':'overdue'};
  const currentFilter = lbl ? (LABEL_TO_FILTER[lbl.textContent] || 'all') : 'all';
  if(document.getElementById('my-task-list')){
    const se = plantOwnerAuthenticated&&currentPlantSession ? ((currentPlantSession.owners||[])[0]||'') : (mode==='user'?(userEmail||''):(localStorage.getItem('self_email')||''));
    renderMyTaskList(se, currentFilter);
    refreshOverdueBadge();
  } else {
    showPanel('mytasks');
  }
}

function parseBulkCSV(text){
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return {tasks:[],errors:['No data found.']};
  // parse header
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\s+/g,'_').replace(/"/g,''));
  const tasks=[], errors=[];
  for(let i=1;i<lines.length;i++){
    const cols = parseCSVLine(lines[i]);
    const row={};
    headers.forEach((h,idx)=>{ row[h]=cols[idx]||''; });
    const err = validateBulkRow(row, i);
    if(err){ errors.push(err); continue; }
    tasks.push(buildBulkTask(row));
  }
  return {tasks,errors};
}

function parseCSVLine(line){
  const result=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c===','&&!inQ){ result.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  result.push(cur.trim());
  return result.map(v=>v.replace(/^"|"$/g,'').trim());
}

function parseBulkJSON(text){
  let arr;
  const tasks=[],errors=[];
  try{ arr=JSON.parse(text.trim()); } catch(e){ return {tasks:[],errors:['Invalid JSON: '+e.message]}; }
  if(!Array.isArray(arr)) return {tasks:[],errors:['JSON must be an array of task objects.']};
  arr.forEach((row,i)=>{
    // normalise keys to lowercase
    const norm={};
    Object.keys(row).forEach(k=>{ norm[k.toLowerCase().replace(/\s+/g,'_')]=row[k]; });
    // map description/desc
    if(norm.description!==undefined&&norm.desc===undefined) norm.desc=norm.description;
    const err=validateBulkRow(norm,i+1);
    if(err){ errors.push(err); return; }
    tasks.push(buildBulkTask(norm));
  });
  return {tasks,errors};
}

function validateBulkRow(row, rowNum){
  const title=(row.title||row.task_title||'').trim();
  const assignee=(row.assignee||row.email||row.assigned_to||'').trim();
  const due=(row.due||row.due_date||row.deadline||'').trim();
  if(!title)    return `Row ${rowNum}: Missing "title"`;
  if(!assignee) return `Row ${rowNum}: Missing "assignee" email`;
  if(!due)      return `Row ${rowNum}: Missing "due" date`;
  if(!/^\d{2}-\d{2}-\d{4}$/.test(due)) return `Row ${rowNum}: "due" must be DD-MM-YYYY format (got: ${due})`;
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(assignee)) return `Row ${rowNum}: Invalid email "${assignee}"`;
  return null;
}

function buildBulkTask(row){
  const validPrios=['High','Medium','Low'];
  const validStatuses=['To Do','In Progress','Review','Done'];
  const prio = validPrios.find(p=>p.toLowerCase()===(row.priority||'').toLowerCase()) || 'Medium';
  const status = validStatuses.find(s=>s.toLowerCase()===(row.status||'').toLowerCase()) || 'To Do';
  const rawTags = row.tags||row.tag||'';
  const tags = Array.isArray(rawTags)
    ? rawTags.map(t=>t.trim()).filter(Boolean)
    : rawTags.split(/[;|]|(?<![a-z]),/i).map(t=>t.trim()).filter(Boolean);
  return {
    id: uid(),
    title: (row.title||row.task_title||'').trim(),
    desc: (row.description||row.desc||'').trim(),
    assignee: (row.assignee||row.email||row.assigned_to||'').trim(),
    priority: prio,
    status: status,
    due: (()=>{ const raw=(row.due||row.due_date||row.deadline||'').trim(); const dm=raw.match(/^(\d{2})-(\d{2})-(\d{4})$/); return dm?dm[3]+'-'+dm[2]+'-'+dm[1]:raw; })(),
    created: today(),
    token: uid(),
    replies: [],
    attachments: [],
    reminder: row.reminder||'none',
    tags: tags
  };
}

function previewBulk(){
  const parsed = _bulkTab==='csv'
    ? parseBulkCSV(document.getElementById('bulk-csv-text').value)
    : parseBulkJSON(document.getElementById('bulk-json-text').value);

  const preview = document.getElementById('bulk-preview');
  const countEl = document.getElementById('bulk-preview-count');
  const rows = document.getElementById('bulk-preview-rows');

  preview.style.display='block';

  countEl.textContent = `(${parsed.tasks.length} valid task${parsed.tasks.length!==1?'s':''})`;

  if(parsed.tasks.length){
    rows.innerHTML = parsed.tasks.map(t=>`
      <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;">
        <span class="badge ${prioBadgeClass(t.priority)}" style="flex-shrink:0">${t.priority}</span>

        </div>

      </div>`).join('');
  } else {
    rows.innerHTML='<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px;">No valid tasks to preview.</div>';
  }

  if(parsed.errors.length){

      <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px;">⚠ ${parsed.errors.length} issue${parsed.errors.length!==1?'s':''} found</div>
      ${parsed.errors.map(e=>`<div style="font-size:12px;color:var(--red);margin-bottom:2px;">${esc(e)}</div>`).join('')}

  } else {
    errs.innerHTML='';

function importBulk(){
  const parsed = _bulkTab==='csv'
    ? parseBulkCSV(document.getElementById('bulk-csv-text').value)
    : parseBulkJSON(document.getElementById('bulk-json-text').value);

  if(!parsed.tasks.length){
    toast('No valid tasks to import. Fix errors first.','var(--red)');
    previewBulk();
    return;
  }
  tasks = [...parsed.tasks, ...tasks];
  localStorage.setItem('tf_tasks',JSON.stringify(tasks));
  if(_fbReady&&_db){
    const batch=_db.batch();
    parsed.tasks.forEach(t=>batch.set(_db.collection('tasks').doc(t.id),t));
    batch.commit().catch(e=>console.warn('importBulk batch error',e));
  }
  closeBulkModal();
  refreshOverdueBadge();
  showPanel(currentPanel);
  toast(`✅ ${parsed.tasks.length} task${parsed.tasks.length!==1?'s':''} imported!`);
}

let _notifications = JSON.parse(localStorage.getItem('tf_notifs') || '[]');

function addNotification(taskId, taskTitle, replyAuthor, replyText){
  const n = {
    id: uid(),
    taskId,
    taskTitle,
    replyAuthor,
    replyText: replyText.slice(0,80)+(replyText.length>80?'…':''),
    time: new Date().toISOString(),

  };

function refreshNotifBadge(){
  const unread = _notifications.filter(n=>!n.read).length;

  if(!badge) return;
  if(unread > 0){
    badge.textContent = unread > 9 ? '9+' : String(unread);
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  CUSTOM DATE PICKER (DD-MM-YY display with calendar selection)
// ═══════════════════════════════════════════════════════════════════════

// Renders a custom date picker widget.
// inputId   : the hidden input that stores YYYY-MM-DD value
// wrapperId : the container div id
// initVal   : initial YYYY-MM-DD value (optional)
// label     : placeholder label shown in text box
function buildDatePickerHTML(inputId, initVal, placeholder) {
  const displayVal = initVal ? fmtDDMMYY(initVal) : '';
  return `
  <div class="datepicker-wrap" id="dpwrap-${inputId}">
    <div class="dp-input-row">
      <input type="text" class="dp-text" id="dptext-${inputId}"
        value="${displayVal}"
        placeholder="${placeholder||'DD-MM-YY'}"
        autocomplete="off"
        oninput="dpHandleTextInput('${inputId}', this.value)"
        onfocus="dpHandleTextInput('${inputId}', this.value)"
      />
      <button type="button" class="dp-cal-btn" onclick="dpToggle('${inputId}')" title="Pick date from calendar">📅</button>
    </div>
    <div class="dp-hint">Format: DD-MM-YY</div>
    <input type="hidden" id="${inputId}" value="${initVal||''}"/>
  </div>`;
}

// Convert YYYY-MM-DD → DD-MM-YY
function fmtDDMMYY(isoStr) {
  if(!isoStr) return '';
  const m = isoStr.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[3]+'-'+m[2]+'-'+m[1].slice(2);
  return isoStr;
}

// Parse DD-MM-YY or DD-MM-YYYY → YYYY-MM-DD (returns '' if invalid)
function parseDDMMYY(str) {
  if(!str) return '';
  str = str.trim();
  // DD-MM-YY or DD-MM-YYYY
  const m = str.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);
  if(!m) return '';
  let [,dd,mm,yy] = m;
  dd = dd.padStart(2,'0'); mm = mm.padStart(2,'0');
  if(yy.length===2) yy = '20'+yy;
  const d = new Date(`${yy}-${mm}-${dd}`);
  if(isNaN(d.getTime())) return '';
  return yy+'-'+mm+'-'+dd;
}

// Tracks open calendar state
let _dpState = {};

function dpHandleTextInput(inputId, val) {
  const iso = parseDDMMYY(val);
  const hiddenEl = document.getElementById(inputId);
  if(hiddenEl) hiddenEl.value = iso || '';
  // Update calendar if open
  if(_dpState[inputId] && iso) {
    const dt = new Date(iso+'T00:00:00');
    _dpState[inputId].viewYear = dt.getFullYear();
    _dpState[inputId].viewMonth = dt.getMonth();
    dpRenderCalendar(inputId);
  }
}

function dpToggle(inputId) {
  const existing = document.getElementById('dpcal-'+inputId);
  if(existing) { dpClose(inputId); return; }
  // Get current value
  const hiddenEl = document.getElementById(inputId);
  const iso = hiddenEl ? hiddenEl.value : '';
  let initDate = iso ? new Date(iso+'T00:00:00') : new Date();
  if(isNaN(initDate)) initDate = new Date();
  _dpState[inputId] = {
    viewYear: initDate.getFullYear(),
    viewMonth: initDate.getMonth(),
    selected: iso || '',
    view: 'days' // 'days' | 'months' | 'years'
  };
  dpRenderCalendar(inputId);
  // Close when clicking outside
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      const wrap = document.getElementById('dpwrap-'+inputId);
      if(wrap && !wrap.contains(e.target)) {
        dpClose(inputId);
        document.removeEventListener('click', handler);
      }
    });
  }, 10);
}

function dpClose(inputId) {
  document.getElementById('dpcal-'+inputId)?.remove();
  delete _dpState[inputId];
}

function dpRenderCalendar(inputId) {
  const existing = document.getElementById('dpcal-'+inputId);
  const state = _dpState[inputId];
  if(!state) return;
  const wrap = document.getElementById('dpwrap-'+inputId);
  if(!wrap) return;
  if(existing) existing.remove();

  const cal = document.createElement('div');
  cal.className = 'dp-calendar';
  cal.id = 'dpcal-'+inputId;

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = new Date(); today.setHours(0,0,0,0);

  if(state.view === 'years') {
    // Year picker
    const startYear = state.viewYear - 6;
    let yearsHTML = '';
    for(let y = startYear; y < startYear+16; y++){
      yearsHTML += `<div class="dp-year-item${y===state.viewYear?' dp-selected-year':''}" onclick="dpSelectYear('${inputId}',${y})">${y}</div>`;
    }
    cal.innerHTML = `
      <div class="dp-nav">
        <button type="button" class="dp-nav-btn" onclick="dpShiftYearPage('${inputId}',-1)">‹</button>
        <span class="dp-month-label" style="cursor:default">${startYear}–${startYear+15}</span>
        <button type="button" class="dp-nav-btn" onclick="dpShiftYearPage('${inputId}',1)">›</button>
      </div>
      <div class="dp-year-grid">${yearsHTML}</div>`;
  } else if(state.view === 'months') {
    // Month picker
    let monthsHTML = MONTHS.map((mn,i)=>`
      <div class="dp-month-item${i===state.viewMonth?' dp-selected-month':''}" onclick="dpSelectMonth('${inputId}',${i})">${SHORT_MONTHS[i]}</div>`).join('');
    cal.innerHTML = `
      <div class="dp-nav">
        <button type="button" class="dp-nav-btn" onclick="dpShiftYear('${inputId}',-1)">‹</button>
        <span class="dp-month-label" onclick="dpSetView('${inputId}','years')">${state.viewYear}</span>
        <button type="button" class="dp-nav-btn" onclick="dpShiftYear('${inputId}',1)">›</button>
      </div>
      <div class="dp-month-grid">${monthsHTML}</div>`;
  } else {
    // Days view
    const firstDay = new Date(state.viewYear, state.viewMonth, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(state.viewYear, state.viewMonth+1, 0).getDate();
    let daysHTML = '<div class="dp-day-name">Su</div><div class="dp-day-name">Mo</div><div class="dp-day-name">Tu</div><div class="dp-day-name">We</div><div class="dp-day-name">Th</div><div class="dp-day-name">Fr</div><div class="dp-day-name">Sa</div>';
    for(let i=0;i<firstDay;i++) daysHTML += '<div class="dp-day dp-empty"></div>';
    const selISO = state.selected;
    for(let d=1;d<=daysInMonth;d++){
      const mm = String(state.viewMonth+1).padStart(2,'0');
      const dd = String(d).padStart(2,'0');
      const iso = `${state.viewYear}-${mm}-${dd}`;
      const isToday = iso === today.toISOString().slice(0,10);
      const isSel = iso === selISO;
      daysHTML += `<div class="dp-day${isToday?' dp-today':''}${isSel?' dp-selected':''}" onclick="dpSelectDay('${inputId}','${iso}')">${d}</div>`;
    }
    cal.innerHTML = `
      <div class="dp-nav">
        <button type="button" class="dp-nav-btn" onclick="dpShiftMonth('${inputId}',-1)">‹</button>
        <span class="dp-month-label" onclick="dpSetView('${inputId}','months')">${SHORT_MONTHS[state.viewMonth]} ${state.viewYear}</span>
        <button type="button" class="dp-nav-btn" onclick="dpShiftMonth('${inputId}',1)">›</button>
      </div>
      <div class="dp-grid">${daysHTML}</div>`;
  }
  wrap.appendChild(cal);
}

function dpSetView(inputId, view) {
  if(_dpState[inputId]) { _dpState[inputId].view = view; dpRenderCalendar(inputId); }
}
function dpShiftMonth(inputId, delta) {
  const s = _dpState[inputId]; if(!s) return;
  let m = s.viewMonth + delta;
  let y = s.viewYear;
  if(m < 0){ m=11; y--; } else if(m > 11){ m=0; y++; }
  s.viewMonth=m; s.viewYear=y;
  dpRenderCalendar(inputId);
}
function dpShiftYear(inputId, delta) {
  const s = _dpState[inputId]; if(!s) return;
  s.viewYear += delta; dpRenderCalendar(inputId);
}
function dpShiftYearPage(inputId, delta) {
  const s = _dpState[inputId]; if(!s) return;
  s.viewYear += delta*16; dpRenderCalendar(inputId);
}
function dpSelectYear(inputId, y) {
  const s = _dpState[inputId]; if(!s) return;
  s.viewYear = y; s.view = 'months'; dpRenderCalendar(inputId);
}
function dpSelectMonth(inputId, m) {
  const s = _dpState[inputId]; if(!s) return;
  s.viewMonth = m; s.view = 'days'; dpRenderCalendar(inputId);
}
function dpSelectDay(inputId, iso) {
  const s = _dpState[inputId]; if(!s) return;
  s.selected = iso;
  const hiddenEl = document.getElementById(inputId);
  if(hiddenEl) hiddenEl.value = iso;
  const textEl = document.getElementById('dptext-'+inputId);
  if(textEl) textEl.value = fmtDDMMYY(iso);
  dpClose(inputId);
}

// ── Reply notification email to admin ────────────────────────────────
async function sendReplyNotificationEmail(task, reply){
  const cfg = getEmailConfig();
  if(!cfg.clientId||!cfg.tenantId) return;
  const adminEmail = localStorage.getItem('admin_notify_email') || '';
  if(!adminEmail){ console.warn('Admin notify email not set'); return; }
  const taskLink = window.location.href.split('?')[0] + '?token=' + (task.token||'');
  try{
    const token = await withTimeout(getMSGraphToken(cfg));
    const bodyHtml = buildEmailHtml(
      { ...task, assignee: adminEmail, desc: '💬 New reply from ' + reply.author + ':\n\n' + (reply.text||'(attachment)') },
      'updated', taskLink, reply.author + ' replied: ' + (reply.text||'').slice(0,120)
    );
    const res = await withTimeout(fetch('https://graph.microsoft.com/v1.0/me/sendMail',{
      method:'POST',
      headers:{ Authorization:'Bearer '+token, 'Content-Type':'application/json' },
      body: JSON.stringify({
        message:{
          subject: '[POLYPLASTICS Tasks] New Reply on Task: ' + task.title,
          body:{ contentType:'HTML', content: bodyHtml },
          toRecipients:[{ emailAddress:{ address: adminEmail } }]
        },
        saveToSentItems: false
      })
    }));
    if(!res.ok){ const err=await res.text(); throw new Error('Graph error '+res.status+': '+err); }
    console.log('Reply notification email sent to admin:', adminEmail);
  }catch(e){
    console.warn('Reply notification email failed:', e.message);
  }
}
