<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POLYPLASTICS — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Microsoft MSAL – Azure AD / Microsoft Graph token acquisition -->
<script src="https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"
  onerror="console.error('❌ MSAL failed to load from unpkg. Trying jsDelivr fallback…');
           var s=document.createElement('script');
           s.src='https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js';
           document.head.appendChild(s);"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --bg:        #08090d;
    --surface:   #10121a;
    --card:      #181c28;
    --card2:     #1e2335;
    --border:    #272d42;
    --border2:   #323a55;
    --accent:    #5b8dee;
    --accent2:   #3d6dd4;
    --green:     #34d399;
    --amber:     #fbbf24;
    --red:       #f87171;
    --purple:    #a78bfa;
    --cyan:      #22d3ee;
    --text:      #e8ecf4;
    --text2:     #9aa5c0;
    --text3:     #5c6680;
    --font-head: 'DM Sans', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius:    12px;
    --radius-lg: 18px;
  }
  /* ─── light theme ─── */
  body.light {
    --bg:        #f0f2f7;
    --surface:   #ffffff;
    --card:      #ffffff;
    --card2:     #eef0f6;
    --border:    #d8dce8;
    --border2:   #c8ccd8;
    --text:      #1a1e2e;
    --text2:     #4a5068;
    --text3:     #8890a8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
  }
  /* ─── scrollbar ─── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ─── layout ─── */
  #app { display: flex; flex-direction: row; min-height: 100vh; align-items: flex-start; }
  #sidebar {
    width: 240px; min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    flex-shrink: 0; flex-grow: 0; flex-basis: 240px;
  }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  #topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  #content { padding: 28px; flex: 1; overflow-y: auto; }

  /* ─── sidebar items ─── */
  .logo {
    padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
    font-family: var(--font-head); font-weight: 800; font-size: 15px;
    color: var(--accent); letter-spacing: 1px; text-transform: uppercase;
  }
  .logo span { display: block; font-size: 10px; font-weight: 500; color: var(--text3); margin-top: 2px; font-family: var(--font-body); letter-spacing: .8px; text-transform: uppercase; }
  .nav-section { padding: 16px 12px 8px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 16px;
    margin: 1px 8px; border-radius: 9px; cursor: pointer; color: var(--text2);
    font-size: 13.5px; font-weight: 500; transition: all .15s; position: relative;
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: rgba(91,141,238,.12); color: var(--accent); }
  .nav-item.active::before { content:''; position:absolute; left:0; top:20%; height:60%; width:3px; background:var(--accent); border-radius:0 3px 3px 0; }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--red); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
  .sidebar-bottom { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }

  /* ─── cards & panels ─── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-sm { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .panel-title { font-family: var(--font-head); font-weight: 800; font-size: 22px; color: var(--text); margin-bottom: 4px; }
  .panel-sub { color: var(--text3); font-size: 13px; margin-bottom: 24px; }

  /* ─── stats grid ─── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden; }
  .stat-card::after { content:''; position:absolute; inset:0; opacity:.04; background: var(--c); pointer-events:none; }
  .stat-value { font-family: var(--font-head); font-size: 32px; font-weight: 800; color: var(--c); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .8px; }
  .stat-icon { position: absolute; right: 14px; top: 14px; font-size: 22px; opacity: .3; }

  /* ─── badges ─── */
  .badge { display: inline-flex; align-items: center; border-radius: 6px; padding: 2px 9px; font-size: 11px; font-weight: 700; letter-spacing: .4px; }
  .badge-high   { background: rgba(248,113,113,.15); color: #f87171; border: 1px solid rgba(248,113,113,.25); }
  .badge-medium { background: rgba(251,191,36,.13);  color: #fbbf24; border: 1px solid rgba(251,191,36,.22); }
  .badge-low    { background: rgba(52,211,153,.13);  color: #34d399; border: 1px solid rgba(52,211,153,.22); }
  .badge-todo   { background: rgba(156,163,176,.1);  color: #9ca3af; border: 1px solid rgba(156,163,176,.2); }
  .badge-inprog { background: rgba(91,141,238,.15);  color: #5b8dee; border: 1px solid rgba(91,141,238,.25); }
  .badge-review { background: rgba(167,139,250,.15); color: #a78bfa; border: 1px solid rgba(167,139,250,.25); }
  .badge-done   { background: rgba(52,211,153,.13);  color: #34d399; border: 1px solid rgba(52,211,153,.22); }
  .badge-overdue{ background: rgba(248,113,113,.2);  color: #f87171; border: 1px solid #f8717144; }

  /* ─── buttons ─── */
  .btn { display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: 9px; font-family: var(--font-body); font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; padding: 10px 20px; font-size: 14px; box-shadow: 0 0 20px rgba(91,141,238,.3); }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); padding: 8px 16px; font-size: 13px; }
  .btn-ghost:hover { background: var(--card); color: var(--text); }
  .btn-danger { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.2); padding: 7px 14px; font-size: 12px; }
  .btn-success { background: rgba(52,211,153,.12); color: var(--green); border: 1px solid rgba(52,211,153,.2); padding: 7px 14px; font-size: 12px; }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }
  .btn-icon { background: var(--card); border: 1px solid var(--border); color: var(--text2); padding: 8px; border-radius: 8px; cursor:pointer; font-size:14px; transition: all .15s; }
  .btn-icon:hover { background: var(--card2); color: var(--text); }

  /* ─── forms ─── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .6px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 9px; padding: 10px 13px; color: var(--text); font-family: var(--font-body);
    font-size: 14px; outline: none; transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--card); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ─── modal ─── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg);
    width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; padding: 28px;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-title { font-family: var(--font-head); font-weight: 700; font-size: 18px; }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; padding: 4px; line-height:1; }
  .modal-close:hover { color: var(--text); }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

  /* ─── task rows ─── */
  .task-row {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 18px; display: flex; align-items: flex-start; gap: 14px;
    transition: all .15s; border-left: 3px solid var(--lc, var(--border));
    cursor: pointer; margin-bottom: 8px;
  }
  .task-row:hover { background: var(--card2); border-color: var(--border2); }
  .task-row-body { flex: 1; min-width: 0; }
  .task-title { font-weight: 600; font-size: 14.5px; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { font-size: 12px; color: var(--text3); display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* ─── kanban ─── */
  .kanban { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .kanban-col-header { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
  .kanban-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .kanban-col-title { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .8px; }
  .kanban-count { margin-left: auto; background: var(--card2); border-radius: 10px; padding: 1px 8px; font-size: 11px; font-weight: 700; color: var(--text2); }
  .kanban-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 13px; margin-bottom: 9px; cursor: pointer; transition: all .15s;
    border-left: 3px solid var(--lc, var(--border));
  }
  .kanban-card:hover { background: var(--card2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.3); }
  .kanban-card-title { font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 7px; }
  .kanban-card-meta { font-size: 11px; color: var(--text3); }

  /* ─── drawer (task detail) ─── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; }
  .drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 640px;
    background: var(--surface); border-left: 1px solid var(--border2); z-index: 101;
    overflow-y: auto; padding: 28px; animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { transform: translateX(60px); opacity:0; } to { transform: none; opacity:1; } }
  .drawer-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }

  /* ─── reply thread ─── */
  .reply-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
  .reply-author { font-size: 12px; font-weight: 700; color: var(--accent); }
  .reply-time { font-size: 11px; color: var(--text3); margin-left: 8px; }
  .reply-text { font-size: 13.5px; color: var(--text2); margin-top: 5px; line-height: 1.6; }
  .reply-attachments { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; }
  .attach-chip { background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.2); border-radius: 6px; padding: 3px 9px; font-size: 11px; color: var(--purple); display: flex; align-items: center; gap: 4px; }

  /* ─── charts ─── */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 22px; }
  .chart-wrap { position: relative; height: 180px; }

  /* ─── progress bar ─── */
  .progress-bar { background: var(--bg); border-radius: 6px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 6px; transition: width .5s ease; }

  /* ─── table ─── */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .7px; padding: 8px 0; border-bottom: 1px solid var(--border); text-align: left; }
  .tbl td { padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,.03); font-size: 13px; color: var(--text2); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }

  /* ─── reminder panel ─── */
  .reminder-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,.03); }
  .reminder-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

  /* ─── user token screen ─── */
  #user-screen { max-width: 520px; margin: 60px auto; text-align: center; }
  .token-box { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 32px; margin-top: 28px; }
  .demo-tokens { margin-top: 18px; background: var(--bg); border-radius: var(--radius); padding: 14px; text-align: left; }
  .demo-token-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
  .token-val { font-family: monospace; font-size: 12px; color: var(--accent); background: rgba(91,141,238,.08); border: 1px solid rgba(91,141,238,.15); border-radius: 5px; padding: 2px 8px; cursor: pointer; }
  .token-val:hover { background: rgba(91,141,238,.18); }

  /* ─── empty state ─── */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ─── toast ─── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--green); color: #000; padding: 12px 22px; border-radius: 10px;
    font-weight: 600; font-size: 14px; z-index: 9999; transition: transform .3s ease; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── misc ─── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .section-head { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .link-chip { background: rgba(91,141,238,.08); border: 1px solid rgba(91,141,238,.18); border-radius: 8px; padding: 8px 13px; font-size: 12px; color: var(--accent); font-family: monospace; word-break: break-all; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .status-btn { padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
  .status-btn:hover, .status-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(91,141,238,.08); }

  /* ─── switch toggle ─── */
  .switch { position: relative; width: 36px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-slider { position: absolute; inset: 0; background: var(--border2); border-radius: 20px; cursor: pointer; transition: .2s; }
  .switch-slider::before { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#fff; left:3px; top:3px; transition:.2s; }
  .switch input:checked + .switch-slider { background: var(--accent); }
  .switch input:checked + .switch-slider::before { transform: translateX(16px); }


  /* ─── plant owner mode — show full sidebar same as admin ─── */
  body.plant-owner-mode .admin-only-nav { display: block; }
  body.plant-owner-mode #plant-nav-items .nav-item { display: flex; }

  /* ─── animations ─── */
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .fade-in { animation: fadeIn .25s ease; }

  /* ─── custom date picker ─── */
  .datepicker-wrap { position: relative; }
  .datepicker-wrap .dp-input-row { display: flex; align-items: center; gap: 0; }
  .datepicker-wrap .dp-text {
    width: 100%; background: var(--bg); border: 1px solid var(--border2);
    border-right: none; border-radius: 9px 0 0 9px; padding: 10px 13px;
    color: var(--text); font-family: var(--font-body); font-size: 14px;
    outline: none; transition: border-color .15s;
  }
  .datepicker-wrap .dp-text:focus { border-color: var(--accent); }
  .datepicker-wrap .dp-cal-btn {
    background: var(--bg); border: 1px solid var(--border2); border-radius: 0 9px 9px 0;
    padding: 0 12px; cursor: pointer; color: var(--text2); font-size: 16px;
    height: 42px; display: flex; align-items: center; transition: all .15s;
  }
  .datepicker-wrap .dp-cal-btn:hover { background: var(--card2); color: var(--accent); border-color: var(--accent); }
  .dp-calendar {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 500;
    background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius);
    box-shadow: 0 8px 32px rgba(0,0,0,.45); padding: 14px; min-width: 260px;
    animation: slideUp .15s ease;
  }
  .dp-calendar .dp-nav {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  }
  .dp-calendar .dp-nav-btn {
    background: none; border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text2); cursor: pointer; font-size: 14px; padding: 4px 10px;
    transition: all .15s;
  }
  .dp-calendar .dp-nav-btn:hover { background: var(--card2); color: var(--accent); border-color: var(--accent); }
  .dp-calendar .dp-month-label {
    font-weight: 700; font-size: 13px; color: var(--text); cursor: pointer;
    padding: 4px 8px; border-radius: 6px; transition: background .15s;
  }
  .dp-calendar .dp-month-label:hover { background: var(--card2); }
  .dp-calendar .dp-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .dp-calendar .dp-day-name {
    text-align: center; font-size: 10px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; padding: 4px 0; letter-spacing: .4px;
  }
  .dp-calendar .dp-day {
    text-align: center; font-size: 12px; padding: 6px 0; border-radius: 6px;
    cursor: pointer; color: var(--text2); transition: all .12s;
  }
  .dp-calendar .dp-day:hover { background: var(--card2); color: var(--text); }
  .dp-calendar .dp-day.dp-today { color: var(--accent); font-weight: 700; }
  .dp-calendar .dp-day.dp-selected { background: var(--accent); color: #fff; font-weight: 700; }
  .dp-calendar .dp-day.dp-selected:hover { background: var(--accent2); }
  .dp-calendar .dp-day.dp-empty { cursor: default; }
  .dp-calendar .dp-day.dp-empty:hover { background: none; }
  .dp-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .dp-year-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 6px;
  }
  .dp-year-item {
    text-align: center; font-size: 12px; padding: 6px 4px; border-radius: 6px;
    cursor: pointer; color: var(--text2); transition: all .12s;
  }
  .dp-year-item:hover { background: var(--card2); color: var(--text); }
  .dp-year-item.dp-selected-year { background: var(--accent); color: #fff; font-weight: 700; }
  .dp-month-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 6px;
  }
  .dp-month-item {
    text-align: center; font-size: 12px; padding: 8px 4px; border-radius: 6px;
    cursor: pointer; color: var(--text2); transition: all .12s;
  }
  .dp-month-item:hover { background: var(--card2); color: var(--text); }
  .dp-month-item.dp-selected-month { background: var(--accent); color: #fff; font-weight: 700; }

  /* ─── file upload ─── */
  .file-drop { border: 2px dashed var(--border2); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--text3); font-size: 13px; cursor: pointer; transition: all .15s; }
  .file-drop:hover { border-color: var(--accent); color: var(--accent); background: rgba(91,141,238,.04); }

  /* ─── responsive ─── */

const fmt = d => {
  if(!d) return '—';
  // For YYYY-MM-DD strings, parse directly (avoids timezone shifts) — returns DD-MM-YY
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[3]+'-'+m[2]+'-'+m[1].slice(2);
  // For ISO timestamp strings (e.g. created field)
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return String(dt.getDate()).padStart(2,'0')+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getFullYear()).slice(2);
};

let _db = null;

(function initFirebase() {
  const s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
  s1.onload = () => {
    const s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
    s2.onload = () => {
      try {
        if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
        _db = firebase.firestore();
        _fbReady = true;

        // Load persisted settings from Firestore
        _db.collection('settings').doc('admin').get().then(d=>{
          if(d.exists&&d.data().password) localStorage.setItem('admin_password',d.data().password);
        }).catch(()=>{});
        _db.collection('settings').doc('msgraph').get().then(d=>{
          if(d.exists){
            const s=d.data();
            if(s.clientId)        localStorage.setItem('ms_client_id',s.clientId);
            if(s.tenantId)        localStorage.setItem('ms_tenant_id',s.tenantId);
            if(s.testEmail)        localStorage.setItem('ms_test_email',s.testEmail);
            if(s.adminNotifyEmail) localStorage.setItem('admin_notify_email',s.adminNotifyEmail);
            if(s.ejsService)       localStorage.setItem('ejs_service_id',s.ejsService);
            if(s.ejsTemplate)      localStorage.setItem('ejs_template_id',s.ejsTemplate);
            if(s.ejsKey)           localStorage.setItem('ejs_public_key',s.ejsKey);
          }
        }).catch(()=>{});
        _db.collection('settings').doc('plantGroups').get().then(d=>{
          if(d.exists&&d.data().plants){
            localStorage.setItem('pg_plants',JSON.stringify(d.data().plants));
            renderPlantNav();
          }
        }).catch(()=>{});
        // Load custom email templates from Firestore
        ['assigned','status_change','completed','reminder','date_change','priority_change','updated'].forEach(key=>{
          _db.collection('settings').doc('email_tpl_'+key).get().then(d=>{
            if(d.exists){ localStorage.setItem('email_tpl_'+key, JSON.stringify(d.data())); }
          }).catch(()=>{});
        });
        // Subscribe to real-time task updates
        _unsubscribeTasks = _db.collection('tasks').onSnapshot(snap => {
          // Mark connected
          const dot=document.getElementById('fb-dot');
          if(dot){dot.style.background='var(--green)';dot.style.boxShadow='0 0 8px var(--green)';dot.title='Firebase: connected ✓';}
          const sdot=document.getElementById('fb-settings-dot');
          const slbl=document.getElementById('fb-settings-label');
          if(sdot){sdot.style.background='var(--green)';sdot.style.boxShadow='0 0 8px var(--green)';}
          if(slbl){slbl.style.color='var(--green)';slbl.textContent='Connected to Firebase ✓ — '+snap.docs.length+' task(s) synced';}
          if (snap.empty && tasks.length === 0) {
            // First run — seed Firestore with demo data
            const batch = _db.batch();
            SEED.forEach(t => batch.set(_db.collection('tasks').doc(t.id), t));
            batch.commit();
          } else if (!snap.empty) {
            const prevTasks = tasks;
            tasks = snap.docs.map(d => d.data());

            // Detect new replies from users (for admin bell notification)
            if(mode === 'admin' && prevTasks.length > 0){
              tasks.forEach(newT => {
                const oldT = prevTasks.find(p => p.id === newT.id);
                const newReplies = (newT.replies || []);
                const oldReplies = (oldT ? (oldT.replies || []) : []);
                if(newReplies.length > oldReplies.length){
                  // New reply(ies) added
                  newReplies.slice(oldReplies.length).forEach(r => {
                    // Only notify admin if reply is NOT from Admin
                    if(r.author !== 'Admin'){
                      addNotification(newT.id, newT.title, r.author, r.text || '(attachment)');
                      // Also send email notification to admin if Microsoft Graph is configured (only for real admin, not plant owner)
                      const cfg = getEmailConfig();
                      if(adminAuthenticated && cfg.clientId && cfg.tenantId){
                        sendReplyNotificationEmail(newT, r);
                      }
                    }
                  });
                }
              });
            }

            refreshOverdueBadge();
            renderPlantNav();
            if (currentPanel === 'dashboard') renderDashboard();
            else if (currentPanel === 'tasks') renderTasks();
            else if (currentPanel === 'kanban') renderKanban();

        }, err => {
          const dot=document.getElementById('fb-dot');
          if(dot){dot.style.background='var(--red)';dot.style.boxShadow='0 0 8px var(--red)';dot.title='Firebase: error — '+err.message;}
          const sdot=document.getElementById('fb-settings-dot');
          const slbl=document.getElementById('fb-settings-label');
          if(sdot){sdot.style.background='var(--red)';sdot.style.boxShadow='0 0 8px var(--red)';}
          if(slbl){slbl.style.color='var(--red)';slbl.textContent='Firebase error: '+err.message;}
          console.warn('Firestore error:', err);
        });
      } catch(e) {
        const dot=document.getElementById('fb-dot');
        if(dot){dot.style.background='var(--red)';dot.style.boxShadow='0 0 8px var(--red)';dot.title='Firebase: init failed';}
        console.warn('Firebase init error:', e);

    };

  };

})();

function saveTasks() {
  localStorage.setItem('tf_tasks', JSON.stringify(tasks));
  if (_fbReady && _db) {
    const batch = _db.batch();
    tasks.forEach(t => { const tc=Object.fromEntries(Object.entries(t).filter(([,v])=>v!==undefined)); batch.set(_db.collection('tasks').doc(tc.id), tc); });
    // Delete removed tasks: get all Firestore IDs and remove ones not in tasks
    _db.collection('tasks').get().then(snap => {
      const localIds = new Set(tasks.map(t => t.id));
      snap.docs.forEach(d => { if (!localIds.has(d.id)) d.ref.delete(); });
    });
    batch.commit().catch(e => console.warn('saveTasks batch error:', e));
  }
}
function getTask(id) { return tasks.find(t=>t.id===id); }
function updateTask(t) {
  tasks = tasks.map(x=>x.id===t.id?t:x);
  localStorage.setItem('tf_tasks', JSON.stringify(tasks));
  if (_fbReady && _db) {
    const tClean = Object.fromEntries(Object.entries(t).filter(([,v])=>v!==undefined));
    _db.collection('tasks').doc(tClean.id).set(tClean).catch(e => console.warn('updateTask error:', e));
  }
}

    name='plant'; // redirect unknown panels to their plant panel
  }
  currentPanel=name;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const hit=document.querySelector(`.nav-item[onclick*="${name}"]`);
  if(hit) hit.classList.add('active');
  document.getElementById('btn-new-task').style.display=((mode==='admin'||plantOwnerAuthenticated)&&name!=='user')?'flex':'none';
  document.getElementById('btn-bulk-upload').style.display=(mode==='admin'&&name!=='user')?'flex':'none';
  document.getElementById('btn-export').style.display=(mode==='admin'&&name!=='user')?'flex':'none';
  const panels={dashboard:renderDashboard,tasks:renderTasks,mytasks:renderMyTasks,kanban:renderKanban,reminders:renderReminders,team:renderTeam,settings:renderSettings,user:renderUser,plant:renderPlantPanel};
  const fn=panels[name];
  if(fn){ document.getElementById('content').innerHTML=''; fn(); }
  const titles={dashboard:'Dashboard',tasks:'All Tasks',mytasks:'My Tasks',kanban:'Kanban Board',reminders:'Reminders',team:'Team',settings:'Settings',user:'My Tasks',plant:'Plant Overview'};
  if(plantOwnerAuthenticated && currentPlantSession && name==='plant'){
    document.getElementById('topbar-title').textContent='🏭 '+currentPlantSession.name;
  } else {
    document.getElementById('topbar-title').textContent=titles[name]||name;
  }
  refreshOverdueBadge();
}

// ═══════════════════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════════════════
function renderDashboard(){
  if(mode==='user'){showPanel('user');return;}
  const c=document.getElementById('content');
  const scopedTasks = getScopedTasks();
  const total=scopedTasks.length;
  const done=scopedTasks.filter(t=>t.status==='Done').length;
  const inprog=scopedTasks.filter(t=>t.status==='In Progress').length;
  const overdue=scopedTasks.filter(isOverdue).length;
  const review=scopedTasks.filter(t=>t.status==='Review').length;
  const rate=total?Math.round(done/total*100):0;

  c.innerHTML=`
  <div class="panel-title fade-in">Command Centre${plantOwnerAuthenticated&&currentPlantSession?' — 🏭 '+esc(currentPlantSession.name):''}</div>
  <div class="panel-sub">Live overview of ${plantOwnerAuthenticated&&currentPlantSession?'your plant tasks':'all tasks'}, team performance, and deadlines</div>

  <div class="stats-grid fade-in" id="dash-stats-grid">
    <div class="stat-card" style="--c:var(--accent);cursor:pointer;" onclick="goToTasksFiltered('All','All')" title="View all tasks">
      <div class="stat-icon">📋</div>
      <div class="stat-value">${total}</div>
      <div class="stat-label">Total Tasks</div>
    </div>
    <div class="stat-card" style="--c:var(--purple);cursor:pointer;grid-column:span 1;position:relative;overflow:visible;" id="my-tasks-stat-card" onclick="goToMyTasksFiltered()" title="View My Tasks">
      <div class="stat-icon">👤</div>
      <div class="stat-value" id="dash-my-tasks-val">—</div>
      <div class="stat-label">My Tasks</div>
      <div id="dash-my-tasks-sub" style="font-size:10px;color:var(--text3);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
    </div>
    <div class="stat-card" style="--c:var(--purple);cursor:pointer;" onclick="goToTasksFiltered('In Progress','All')" title="View In Progress tasks">
      <div class="stat-icon">⚡</div>
      <div class="stat-value">${inprog}</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-card" style="--c:var(--amber);cursor:pointer;" onclick="goToTasksFiltered('Review','All')" title="View In Review tasks">
      <div class="stat-icon">👁</div>
      <div class="stat-value">${review}</div>
      <div class="stat-label">In Review</div>
    </div>
    <div class="stat-card" style="--c:var(--green);cursor:pointer;" onclick="goToTasksFiltered('Done','All')" title="View completed tasks">
      <div class="stat-icon">✅</div>
      <div class="stat-value">${done}</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-card" style="--c:var(--red);cursor:pointer;" onclick="goToTasksFiltered('overdue','All')" title="View overdue tasks">
      <div class="stat-icon">🚨</div>
      <div class="stat-value">${overdue}</div>
      <div class="stat-label">Overdue</div>
    </div>
    <div class="stat-card" style="--c:var(--cyan);cursor:pointer;" onclick="goToTasksFiltered('All','All')" title="View all tasks">
      <div class="stat-icon">📈</div>
      <div class="stat-value">${rate}%</div>
      <div class="stat-label">Completion Rate</div>
    </div>
  </div>

  <div class="charts-grid fade-in" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">
    <div class="card"><div class="section-head" style="margin-bottom:12px">By Status</div><div class="chart-wrap"><canvas id="ch-status"></canvas></div></div>
    <div class="card"><div class="section-head" style="margin-bottom:12px">By Priority</div><div class="chart-wrap"><canvas id="ch-prio"></canvas></div></div>
    <div class="card"><div class="section-head" style="margin-bottom:12px">Weekly Trend</div><div class="chart-wrap"><canvas id="ch-trend"></canvas></div></div>
    <div class="card"><div class="section-head" style="margin-bottom:12px">Tasks by Assignee</div><div class="chart-wrap"><canvas id="ch-assignee"></canvas></div></div>
  </div>

  <div class="charts-grid fade-in" style="grid-template-columns:repeat(auto-fit,minmax(320px,1fr));margin-bottom:22px">
    <div class="card">
      <div class="section-head" style="margin-bottom:4px">On-Time Compliance by Assignee</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">% of completed tasks closed on or before due date</div>
      <div class="chart-wrap" style="height:220px"><canvas id="ch-compliance"></canvas></div>
    </div>
    <div class="card">
      <div class="section-head" style="margin-bottom:4px">Avg. Days to Close (vs Assigned Date)</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">Average days from task creation to completion, per assignee</div>
      <div class="chart-wrap" style="height:220px"><canvas id="ch-avgclose"></canvas></div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:14px" class="fade-in">
    <div class="card">
      <div class="section-head" style="margin-bottom:14px">Team Workload</div>
      <table class="tbl" id="team-tbl"></table>
    </div>
    <div class="card">
      <div class="section-head" style="margin-bottom:14px">Upcoming Deadlines</div>
      <div id="upcoming-list"></div>
    </div>
  </div>

  <div class="card fade-in" style="margin-top:0" id="dash-plant-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="section-head" style="margin-bottom:0">🏭 Plant-wise Performance</div>
      <span style="font-size:11px;color:var(--text3)">Manage plants in Settings → Plant Groups</span>
    </div>
    <div id="dash-plant-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px"></div>
  </div>`;

  // ── Populate "My Tasks" stat card ────────────────────────────────────
  (()=>{
    const valEl = document.getElementById('dash-my-tasks-val');
    const subEl = document.getElementById('dash-my-tasks-sub');

    // Plant owner: use their own owner email(s), never the admin's self_email
    if(plantOwnerAuthenticated && currentPlantSession){
      const ownerEmails=(currentPlantSession.owners||[]).map(e=>e.toLowerCase());
      if(!ownerEmails.length){
        if(valEl) valEl.textContent='—';
        if(subEl){ subEl.textContent='No owner email set'; subEl.style.color='var(--text3)'; }
        return;
      }
      const myT=tasks.filter(t=>ownerEmails.includes((t.assignee||'').toLowerCase()));
      const myOpen=myT.filter(t=>t.status!=='Done').length;
      const myOver=myT.filter(t=>isOverdue(t)).length;
      if(valEl) valEl.textContent=myT.length;
      if(subEl){
        subEl.textContent=myOver?'⚠ '+myOver+' overdue · '+myOpen+' open':myOpen+' open · '+myT.filter(t=>t.status==='Done').length+' done';
        subEl.style.color=myOver?'var(--red)':'var(--text3)';
      }
      return;
    }

    // Admin / user mode: use stored self_email identity
    const selfEmail = mode==='user' ? (userEmail||'') : (localStorage.getItem('self_email')||'');
    if(!selfEmail){
      if(valEl) valEl.textContent = '—';
      if(subEl){ subEl.textContent = 'Set identity in My Tasks'; subEl.style.color='var(--text3)'; }
      return;
    }
    const myT = tasks.filter(t=>(t.assignee||'').toLowerCase()===selfEmail.toLowerCase());
    const myOpen = myT.filter(t=>t.status!=='Done').length;
    const myOver = myT.filter(t=>isOverdue(t)).length;
    if(valEl) valEl.textContent = myT.length;
    if(subEl){
      subEl.textContent = myOver ? '⚠ '+myOver+' overdue · '+myOpen+' open' : myOpen+' open · '+myT.filter(t=>t.status==='Done').length+' done';
      subEl.style.color = myOver ? 'var(--red)' : 'var(--text3)';
    }
  })();

  // charts
  setTimeout(()=>{
    const statusData={
      labels:STATUSES,
      datasets:[{data:STATUSES.map(s=>scopedTasks.filter(t=>t.status===s).length),
      backgroundColor:['rgba(156,163,176,.7)','rgba(91,141,238,.7)','rgba(167,139,250,.7)','rgba(52,211,153,.7)'],
      borderWidth:0,hoverOffset:4}]};
    destroyChart('ch-status');
    chartInstances['ch-status']=new Chart(document.getElementById('ch-status'),{type:'doughnut',data:statusData,options:{plugins:{legend:{position:'right',labels:{color:'#9aa5c0',boxWidth:10,font:{size:11}}}},cutout:'65%',maintainAspectRatio:false}});

    const prioData={
      labels:PRIOS,
      datasets:[{data:PRIOS.map(p=>scopedTasks.filter(t=>t.priority===p).length),
      backgroundColor:['rgba(248,113,113,.7)','rgba(251,191,36,.7)','rgba(52,211,153,.7)'],
      borderWidth:0}]};
    destroyChart('ch-prio');
    chartInstances['ch-prio']=new Chart(document.getElementById('ch-prio'),{type:'bar',data:prioData,options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9aa5c0',font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#9aa5c0',font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}}},maintainAspectRatio:false}});

    // Weekly trend — count tasks created per week for last 6 weeks
    const now=new Date();
    const weeks=[]; const trendVals=[];
    for(let i=5;i>=0;i--){
      const wStart=new Date(now); wStart.setDate(now.getDate()-now.getDay()-(i*7));
      const wEnd=new Date(wStart); wEnd.setDate(wStart.getDate()+6);
      const ws=wStart.toISOString().slice(0,10); const we=wEnd.toISOString().slice(0,10);
      trendVals.push(scopedTasks.filter(t=>t.created&&t.created>=ws&&t.created<=we).length);
      weeks.push(i===0?'This wk':i===1?'Last wk':(i+'w ago'));
    }
    destroyChart('ch-trend');
    chartInstances['ch-trend']=new Chart(document.getElementById('ch-trend'),{type:'line',data:{labels:weeks,datasets:[{data:trendVals,borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.08)',tension:.4,fill:true,pointBackgroundColor:'#34d399',pointRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9aa5c0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#9aa5c0',font:{size:10},stepSize:1},grid:{color:'rgba(255,255,255,.04)'}}},maintainAspectRatio:false}});

    // assignee chart
    const assigneeMap={};
    scopedTasks.forEach(t=>{
      if(!t.assignee) return;
      const name=t.assignee.split('@')[0]; // shorten email to name part
      assigneeMap[name]=(assigneeMap[name]||0)+1;
    });
    const aLabels=Object.keys(assigneeMap);
    const aVals=Object.values(assigneeMap);
    const aColors=['rgba(91,141,238,.75)','rgba(167,139,250,.75)','rgba(52,211,153,.75)','rgba(251,191,36,.75)','rgba(248,113,113,.75)','rgba(34,211,238,.75)','rgba(249,115,22,.75)','rgba(16,185,129,.75)'];
    destroyChart('ch-assignee');
    chartInstances['ch-assignee']=new Chart(document.getElementById('ch-assignee'),{
      type:'bar',
      data:{
        labels:aLabels,
        datasets:[{
          data:aVals,
          backgroundColor:aLabels.map((_,i)=>aColors[i%aColors.length]),
          borderRadius:5,
          borderWidth:0
        }]
      },
      options:{
        indexAxis:'y',
        plugins:{legend:{display:false}},
        scales:{
          x:{ticks:{color:'#9aa5c0',font:{size:10},stepSize:1},grid:{color:'rgba(255,255,255,.04)'}},
          y:{ticks:{color:'#9aa5c0',font:{size:10}},grid:{display:false}}
        },
        maintainAspectRatio:false
      }
    });

    // ── On-Time Compliance by Assignee ──────────────────────────────
    (()=>{
      const assignees=[...new Set(scopedTasks.filter(t=>t.assignee).map(t=>t.assignee.split('@')[0]))];
      const complianceVals=assignees.map(name=>{
        const doneTasks=scopedTasks.filter(t=>t.assignee&&t.assignee.split('@')[0]===name&&t.status==='Done');
        if(!doneTasks.length) return 0;
        const onTime=doneTasks.filter(t=>{
          const closeDate=t.closedAt||t.doneAt||null;
          if(closeDate) return closeDate<=t.due;
          return t.due&&t.created&&t.due>=t.created;
        }).length;
        return Math.round(onTime/doneTasks.length*100);
      });
      const compColors=complianceVals.map(v=>v>=80?'rgba(52,211,153,.75)':v>=50?'rgba(251,191,36,.75)':'rgba(248,113,113,.75)');
      destroyChart('ch-compliance');
      chartInstances['ch-compliance']=new Chart(document.getElementById('ch-compliance'),{
        type:'bar',
        data:{
          labels:assignees,
          datasets:[{
            label:'On-Time %',
            data:complianceVals,
            backgroundColor:compColors,
            borderRadius:6,
            borderWidth:0
          }]
        },
        options:{
          indexAxis:'y',
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{label:ctx=>' '+ctx.raw+'% on-time'}}
          },
          scales:{
            x:{
              min:0,max:100,
              ticks:{color:'#9aa5c0',font:{size:10},callback:v=>v+'%'},
              grid:{color:'rgba(255,255,255,.04)'}
            },
            y:{ticks:{color:'#9aa5c0',font:{size:10}},grid:{display:false}}
          },
          maintainAspectRatio:false
        }
      });
    })();

    // ── Avg Days to Close (vs original assigned/created date) ───────
    (()=>{
      const assignees=[...new Set(scopedTasks.filter(t=>t.assignee).map(t=>t.assignee.split('@')[0]))];
      const avgDaysVals=assignees.map(name=>{
        const doneTasks=scopedTasks.filter(t=>t.assignee&&t.assignee.split('@')[0]===name&&t.status==='Done'&&t.created);
        if(!doneTasks.length) return null;
        const totalDays=doneTasks.reduce((sum,t)=>{
          const closeDate=t.closedAt||t.doneAt||null;
          const end=closeDate?new Date(closeDate):new Date();
          const start=new Date(t.created);
          const diff=Math.max(0,Math.round((end-start)/(1000*60*60*24)));
          return sum+diff;
        },0);
        return Math.round(totalDays/doneTasks.length);
      });
      const acColors=['rgba(91,141,238,.75)','rgba(167,139,250,.75)','rgba(34,211,238,.75)','rgba(249,115,22,.75)','rgba(16,185,129,.75)','rgba(251,191,36,.75)','rgba(248,113,113,.75)','rgba(52,211,153,.75)'];
      destroyChart('ch-avgclose');
      chartInstances['ch-avgclose']=new Chart(document.getElementById('ch-avgclose'),{
        type:'bar',
        data:{
          labels:assignees,
          datasets:[{
            label:'Avg Days',
            data:avgDaysVals,
            backgroundColor:assignees.map((_,i)=>acColors[i%acColors.length]),
            borderRadius:6,
            borderWidth:0
          }]
        },
        options:{
          indexAxis:'y',
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{label:ctx=>ctx.raw===null?' No data':' '+ctx.raw+' days avg'}}
          },
          scales:{
            x:{
              ticks:{color:'#9aa5c0',font:{size:10},callback:v=>v+'d'},
              grid:{color:'rgba(255,255,255,.04)'}
            },
            y:{ticks:{color:'#9aa5c0',font:{size:10}},grid:{display:false}}
          },
          maintainAspectRatio:false
        }
      });
    })();

    // team table
    const byPerson=[...new Set(scopedTasks.map(t=>t.assignee))].map(e=>({email:e,total:scopedTasks.filter(t=>t.assignee===e).length,done:scopedTasks.filter(t=>t.assignee===e&&t.status==='Done').length}));
    document.getElementById('team-tbl').innerHTML=`<thead><tr><th>Member</th><th>Total</th><th>Done</th><th style="width:120px">Progress</th></tr></thead><tbody>`+
      byPerson.map(p=>{const pct=p.total?Math.round(p.done/p.total*100):0;return`<tr><td><div style="font-size:13px;color:var(--text)">${p.email}</div></td><td>${p.total}</td><td style="color:var(--green)">${p.done}</td><td><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div></div><div style="font-size:10px;color:var(--text3);margin-top:3px">${pct}%</div></td></tr>`;}).join('')+`</tbody>`;

    // upcoming
    const upcoming=scopedTasks.filter(t=>t.status!=='Done').sort((a,b)=>a.due.localeCompare(b.due)).slice(0,5);
    document.getElementById('upcoming-list').innerHTML=upcoming.length?upcoming.map(t=>`
      <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer" onclick="openDrawer('${t.id}')">
        <div style="width:6px;height:6px;border-radius:50%;background:${PRIO_COLOR[t.priority]};flex-shrink:0"></div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</div><div style="font-size:11px;color:var(--text3)">${t.assignee}</div></div>
        <div style="font-size:11px;color:${isOverdue(t)?'var(--red)':'var(--text3)'};white-space:nowrap">${fmt(t.due)}</div>
      </div>`).join(''):'<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">All tasks done! 🎉</div>';
    // ── Plant-wise performance ──────────────────────────────────────
    renderDashPlants();
  },50);
}


// ═══════════════════════════════════════════════════════════════════════
//  PLANT GROUPS — data helpers
// ═══════════════════════════════════════════════════════════════════════
function getPlantGroups(){
  try{ return JSON.parse(localStorage.getItem('pg_plants')||'[]'); }catch(e){return [];}
}
function savePlantGroups(arr){
  localStorage.setItem('pg_plants', JSON.stringify(arr));
  if(_fbReady&&_db) _db.collection('settings').doc('plantGroups').set({plants:arr}).catch(e=>console.warn('plant save err',e));
}

// ── Sidebar plant nav ─────────────────────────────────────────────────
function renderPlantNav(){
  const el=document.getElementById('plant-nav-items');
  if(!el) return;
  const groups=getPlantGroups();
  if(!groups.length){
    el.innerHTML=`<div style="padding:4px 16px 8px;font-size:11px;color:var(--text3)">No plants yet.<br><span style="cursor:pointer;color:var(--accent)" onclick="showPanel('settings');setTimeout(()=>{const s=document.getElementById('plant-settings-section');if(s)s.scrollIntoView({behavior:'smooth'});},200)">Add in Settings →</span></div>`;
    return;
  }
  el.innerHTML=groups.map(p=>`
    <div class="nav-item" onclick="showPlantPanel('${esc(p.id)}')" id="plant-nav-${p.id}">
      <span class="nav-icon">🏭</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span>
    </div>`).join('');
}

// ── Show a single plant panel ─────────────────────────────────────────
let _activePlantId = null;
function showPlantPanel(id){
  _activePlantId=id;
  showPanel('plant');
}

function renderPlantPanel(){
  if(mode==='user'){showPanel('user');return;}
  const groups=getPlantGroups();
  if(!_activePlantId&&groups.length) _activePlantId=groups[0]?.id;
  const plant=groups.find(p=>p.id===_activePlantId);
  const c=document.getElementById('content');
  if(!plant){
    c.innerHTML=`<div class="panel-title fade-in">Plant Overview</div><div class="panel-sub">No plant selected. <a onclick="showPanel('settings')" style="color:var(--accent);cursor:pointer">Add plants in Settings →</a></div>`;
    return;
  }
  // tasks for this plant
  const owners=(plant.owners||[]).map(o=>o.toLowerCase());
  const plantTasks=tasks.filter(t=>owners.includes((t.assignee||'').toLowerCase())||(t.plant&&t.plant===plant.id));
  const total=plantTasks.length;
  const done=plantTasks.filter(t=>t.status==='Done').length;
  const inprog=plantTasks.filter(t=>t.status==='In Progress').length;
  const overdue=plantTasks.filter(isOverdue).length;
  const rate=total?Math.round(done/total*100):0;

  c.innerHTML=`
  ${sessionStorage.getItem('pg_impersonate_return') ? `<div style="background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;"><span style="color:var(--amber);font-size:13px;font-weight:600;">👁 Viewing as: <strong>${esc(plant.name)}</strong> Owner</span><button class="btn btn-ghost btn-sm" onclick="exitImpersonation()" style="color:var(--amber);border-color:rgba(251,191,36,.35);">↩ Back to Super Admin</button></div>` : ''}
  <div class="panel-title fade-in">🏭 ${esc(plant.name)}</div>
  <div class="panel-sub">Owner: <strong style="color:var(--accent)">${esc((plant.owners||[]).join(', ')||'—')}</strong> &nbsp;·&nbsp; ${total} tasks</div>

  <div class="stats-grid fade-in">
    <div class="stat-card" style="--c:var(--accent);cursor:pointer;" onclick="renderPlantTaskRows('All')" title="View all tasks"><div class="stat-icon">📋</div><div class="stat-value">${total}</div><div class="stat-label">Total Tasks</div></div>
    <div class="stat-card" style="--c:var(--purple);cursor:pointer;" onclick="renderPlantTaskRows('In Progress')" title="View In Progress tasks"><div class="stat-icon">⚡</div><div class="stat-value">${inprog}</div><div class="stat-label">In Progress</div></div>

    <div class="stat-card" style="--c:var(--red);cursor:pointer;" onclick="renderPlantTaskRows('overdue')" title="View overdue tasks"><div class="stat-icon">🚨</div><div class="stat-value">${overdue}</div><div class="stat-label">Overdue</div></div>

// ── Render filtered task rows inside the plant panel ─────────────────
function renderPlantTaskRows(filter){
  const groups=getPlantGroups();
  const plant=groups.find(p=>p.id===_activePlantId);
  if(!plant) return;
  const owners=(plant.owners||[]).map(o=>o.toLowerCase());
  const plantTasks=tasks.filter(t=>owners.includes((t.assignee||'').toLowerCase())||(t.plant&&t.plant===plant.id));

  let filtered;
  let labelText;
  if(filter==='overdue'){
    filtered=plantTasks.filter(isOverdue);
    labelText='Overdue';
  } else if(filter==='All'){
    filtered=plantTasks;
    labelText='All';
  } else {
    filtered=plantTasks.filter(t=>t.status===filter);
    labelText=filter;
  }

  // Update pill label
  const lbl=document.getElementById('plant-task-filter-label');
  const pillColors={
    'All':'rgba(91,141,238,.12)',
    'In Progress':'rgba(91,141,238,.15)',
    'Done':'rgba(52,211,153,.13)',
    'Review':'rgba(167,139,250,.15)',
    'To Do':'rgba(156,163,176,.1)',
    'Overdue':'rgba(248,113,113,.2)'
  };
  const pillText={
    'All':'var(--accent)',
    'In Progress':'var(--accent)',
    'Done':'var(--green)',
    'Review':'var(--purple)',
    'To Do':'var(--text3)',
    'Overdue':'var(--red)'
  };
  if(lbl){
    lbl.textContent=labelText;
    lbl.style.background=pillColors[labelText]||pillColors['All'];
    lbl.style.color=pillText[labelText]||pillText['All'];
  }

  const tRows=document.getElementById('plant-task-rows');
  if(!tRows) return;
  if(!filtered.length){
    tRows.innerHTML='<div class="empty"><div class="empty-icon">🌿</div><div>No tasks match this filter</div></div>';
    return;
  }
  tRows.innerHTML=filtered.map(t=>`
    <div class="task-row" style="--lc:${PRIO_COLOR[t.priority]}" onclick="openDrawer('${t.id}')">
      <div class="task-row-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          <span>👤 ${esc(t.assignee)}</span>
          <span>📅 <span style="color:${isOverdue(t)?'var(--red)':'inherit'}">${fmt(t.due)}</span></span>
          ${t.completedDate?`<span style="color:var(--green);font-weight:600">✅ Done: ${fmt(t.completedDate)}</span>`:''}
          ${isOverdue(t)?'<span style="color:var(--red);font-weight:600">Overdue</span>':''}
        </div>
      </div>
      <div class="task-actions" onclick="event.stopPropagation()">
        <span class="badge ${prioBadgeClass(t.priority)}">${t.priority}</span>
        <span class="badge ${statusBadgeClass(t.status)}">${t.status}</span>
        ${isOverdue(t)?'<span class="badge badge-overdue">Overdue</span>':''}
      </div>
    </div>`).join('');
}

// ── Dashboard plant performance grid ─────────────────────────────────
function renderDashPlants(){
  const sec=document.getElementById('dash-plant-section');
  const grid=document.getElementById('dash-plant-grid');
  if(!sec||!grid) return;
  const groups=getPlantGroups();
  if(!groups.length){
    sec.style.display='none'; return;
  }
  sec.style.display='';
  const aColors=['#5b8dee','#a78bfa','#34d399','#fbbf24','#f87171','#22d3ee','#f97316','#10b981','#ec4899','#8b5cf6'];
  grid.innerHTML=groups.map((p,idx)=>{
    const owners=(p.owners||[]).map(o=>o.toLowerCase());
    const pt=tasks.filter(t=>owners.includes((t.assignee||'').toLowerCase())||(t.plant&&t.plant===p.id));
    const done=pt.filter(t=>t.status==='Done').length;
    const overdue=pt.filter(isOverdue).length;
    const rate=pt.length?Math.round(done/pt.length*100):0;
    const col=aColors[idx%aColors.length];
    const barColor=rate>=80?'var(--green)':rate>=50?'var(--amber)':'var(--red)';
    return `<div class="card" style="cursor:pointer;border-left:3px solid ${col};padding:16px" onclick="showPlantPanel('${p.id}')">
      <div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((p.owners||[]).join(', ')||'No owner')}</div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px">
        <span style="color:var(--text2)">${pt.length} tasks</span>
        <span style="color:var(--green)">${done} done</span>
        ${overdue?`<span style="color:var(--red)">${overdue} overdue</span>`:''}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${rate}%;background:${barColor}"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px;text-align:right">${rate}% complete</div>
    </div>`;
  }).join('');
}

//  ALL TASKS
// ═══════════════════════════════════════════════════════════════════════
let taskFilters={status:'All',priority:'All',search:'',overdue:false};

let _selectedTasks = new Set();

function renderTasks(){
  if(mode==='user'){showPanel('user');return;}
  _selectedTasks.clear();
  const c=document.getElementById('content');
  c.innerHTML=`
  <div class="panel-title fade-in">All Tasks</div>
  <div class="panel-sub">${getScopedTasks().length} total tasks${plantOwnerAuthenticated&&currentPlantSession?' for 🏭 '+esc(currentPlantSession.name):' across all team members'}</div>
  <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center" class="fade-in">
    <input id="tf-search" class="form-input" style="max-width:280px;padding:9px 13px" placeholder="🔍  Search tasks or members…" value="${taskFilters.search}" oninput="taskFilters.search=this.value;renderTaskRows()"/>
    <select id="tf-status" class="form-select" style="max-width:160px" onchange="taskFilters.status=this.value;taskFilters.overdue=false;renderTaskRows()">
      <option>All</option>${STATUSES.map(s=>`<option${taskFilters.status===s?' selected':''}>${s}</option>`).join('')}
    </select>
    <select id="tf-prio" class="form-select" style="max-width:140px" onchange="taskFilters.priority=this.value;renderTaskRows()">
      <option>All</option>${PRIOS.map(p=>`<option${taskFilters.priority===p?' selected':''}>${p}</option>`).join('')}
    </select>
    <button class="btn btn-ghost btn-sm" onclick="taskFilters={status:'All',priority:'All',search:'',overdue:false};renderTasks()">Reset</button>
    <button class="btn btn-ghost btn-sm" onclick="selectAllTasks()" title="Select all visible tasks" style="margin-left:auto;">☑ Select All</button>
  </div>
  <!-- Bulk action bar — hidden until selection made -->
  <div id="bulk-action-bar" style="display:none;align-items:center;gap:10px;padding:10px 14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:var(--radius);margin-bottom:14px;">
    <span id="bulk-count" style="font-weight:700;font-size:13px;color:var(--red);">0 selected</span>
    <button class="btn btn-danger btn-sm" onclick="bulkDeleteTasks()">🗑 Delete Selected</button>
    <button class="btn btn-ghost btn-sm" onclick="clearSelection()">✕ Clear Selection</button>
  </div>
  <div id="task-rows" class="fade-in"></div>`;
  renderTaskRows();
}

function toggleTaskSelect(id, checked){
  if(checked) _selectedTasks.add(id);
  else _selectedTasks.delete(id);
  updateBulkBar();
}

function updateBulkBar(){
  const bar = document.getElementById('bulk-action-bar');
  const cnt = document.getElementById('bulk-count');
  if(!bar||!cnt) return;
  if(_selectedTasks.size > 0){
    bar.style.display='flex';
    cnt.textContent = _selectedTasks.size + ' task' + (_selectedTasks.size>1?'s':'') + ' selected';
  } else {
    bar.style.display='none';
  }
}

function selectAllTasks(){
  const checkboxes = document.querySelectorAll('.task-select-cb');
  const allChecked = checkboxes.length > 0 && [...checkboxes].every(cb=>cb.checked);
  checkboxes.forEach(cb=>{
    cb.checked = !allChecked;
    if(!allChecked) _selectedTasks.add(cb.dataset.id);
    else _selectedTasks.delete(cb.dataset.id);
  });
  updateBulkBar();
}

function clearSelection(){
  _selectedTasks.clear();
  document.querySelectorAll('.task-select-cb').forEach(cb=>cb.checked=false);
  updateBulkBar();
}

function bulkDeleteTasks(){
  if(_selectedTasks.size===0) return;
  const count = _selectedTasks.size;
  if(!confirm(`Permanently delete ${count} task${count>1?'s':''}? This cannot be undone.`)) return;
  const ids = [..._selectedTasks];
  tasks = tasks.filter(t=>!ids.includes(t.id));
  localStorage.setItem('tf_tasks', JSON.stringify(tasks));
  if(_fbReady&&_db){
    const batch=_db.batch();
    ids.forEach(id=>batch.delete(_db.collection('tasks').doc(id)));
    batch.commit().catch(e=>console.warn('bulk delete error',e));
  }
  _selectedTasks.clear();
  toast(`🗑 ${count} task${count>1?'s':''} deleted`, 'var(--red)');
  refreshOverdueBadge();
  renderTasks();
}

function renderTaskRows(){
  const filtered=getScopedTasks().filter(t=>{
    const ss=(taskFilters.overdue===true) ? isOverdue(t) : (taskFilters.status==='All'||t.status===taskFilters.status);
    const sp=taskFilters.priority==='All'||t.priority===taskFilters.priority;
    const sq=!taskFilters.search||t.title.toLowerCase().includes(taskFilters.search.toLowerCase())||t.assignee.toLowerCase().includes(taskFilters.search.toLowerCase());
    return ss&&sp&&sq;
  });
  const el=document.getElementById('task-rows');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>No tasks match your filters</div></div>';return;}
  el.innerHTML=filtered.map(t=>`
    <div class="task-row" style="--lc:${PRIO_COLOR[t.priority]};${_selectedTasks.has(t.id)?'background:rgba(248,113,113,.06);border-color:rgba(248,113,113,.3);':''}" onclick="openDrawer('${t.id}')">
      <div style="display:flex;align-items:center;padding:2px 4px 0 0;flex-shrink:0" onclick="event.stopPropagation()">
        <input type="checkbox" class="task-select-cb" data-id="${t.id}" ${_selectedTasks.has(t.id)?'checked':''} onchange="toggleTaskSelect('${t.id}',this.checked)" style="width:16px;height:16px;cursor:pointer;accent-color:var(--red);"/>
      </div>
      <div class="task-row-body">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <span>👤 ${t.assignee}</span>
          <span>📅 <span style="color:${isOverdue(t)?'var(--red)':'inherit'}">${fmt(t.due)}</span></span>
          ${t.completedDate?`<span style="color:var(--green);font-weight:600">✅ ${fmt(t.completedDate)}</span>`:''}
          ${(t.replies||[]).length?`<span>💬 ${(t.replies||[]).length}</span>`:''}
          ${(t.attachments||[]).length?`<span>📎 ${(t.attachments||[]).length}</span>`:''}
          ${t.reminder&&t.reminder!=='none'?`<span>🔔 ${t.reminder}</span>`:''}
          ${t.tags&&t.tags.length?t.tags.map(tag=>`<span style="background:rgba(91,141,238,.1);color:var(--accent);border:1px solid rgba(91,141,238,.2);border-radius:4px;padding:1px 6px;font-size:10px">${tag}</span>`).join(''):''}
        </div>
      </div>
      <div class="task-actions" onclick="event.stopPropagation()">
        <span class="badge ${prioBadgeClass(t.priority)}">${t.priority}</span>
        <span class="badge ${statusBadgeClass(t.status)}">${t.status}</span>
        ${isOverdue(t)?'<span class="badge badge-overdue">Overdue</span>':''}
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${t.id}')">✏ Edit</button>
        <button class="btn btn-success btn-sm" title="Send email to assignee" onclick="sendMailtoEmail('${t.id}')">📧</button>
      </div>
    </div>`).join('');
}

function deleteTask(id){
  if(!confirm('Delete this task permanently?'))return;
  tasks=tasks.filter(t=>t.id!==id);
  localStorage.setItem('tf_tasks',JSON.stringify(tasks));
  if(_fbReady&&_db) _db.collection('tasks').doc(id).delete().catch(e=>console.warn('delete error',e));
  renderTaskRows(); refreshOverdueBadge();
  toast('Task deleted','var(--red)');
}

function renderKanban(){
  if(mode==='user'){showPanel('user');return;}
  const c=document.getElementById('content');

  function kanbanCard(t){
    try{
      const overdue = isOverdue(t);
      const replies = (t.replies||[]).length;
      const attachments = (t.attachments||[]).length;
      return `<div class="kanban-card" style="--lc:${PRIO_COLOR[t.priority]||'var(--border)'}" onclick="openDrawer('${t.id}')">
        <div class="kanban-card-title">${esc(t.title||'Untitled')}</div>
        <div style="display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap">
          <span class="badge ${prioBadgeClass(t.priority)}">${t.priority||''}</span>
          ${overdue?'<span class="badge badge-overdue">Overdue</span>':''}
        </div>
        <div class="kanban-card-meta">
          <div style="margin-bottom:3px">👤 ${esc(t.assignee||'Unassigned')}</div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="color:${overdue?'var(--red)':'inherit'}">📅 ${t.due?fmt(t.due):'No date'}</span>
            <span>${replies?`💬${replies} `:''}${attachments?`📎${attachments}`:''}</span>
          </div>
          ${t.completedDate?`<div style="color:var(--green);font-size:10px;font-weight:700;margin-top:3px">✅ Done: ${fmt(t.completedDate)}</div>`:''}
        </div>
      </div>`;
    }catch(e){ return ''; }
  }

  function kanbanCol(status){
    const col = getScopedTasks().filter(t=>t.status===status);
    const color = STATUS_COLOR[status]||'var(--text3)';
    const cards = col.map(kanbanCard).join('');
    const empty = col.length===0
      ? `<div style="text-align:center;padding:24px 0;color:var(--text3);font-size:12px;border:2px dashed var(--border);border-radius:var(--radius)">Empty</div>`
      : '';
    return `<div>
      <div class="kanban-col-header">
        <div class="kanban-dot" style="background:${color}"></div>
        <div class="kanban-col-title" style="color:${color}">${status}</div>
        <div class="kanban-count">${col.length}</div>
      </div>
      <div>${cards}${empty}</div>
    </div>`;
  }

  const cols = STATUSES.map(kanbanCol).join('');
  c.innerHTML = `
    <div class="panel-title fade-in">Kanban Board</div>
    <div class="panel-sub">Visual task board — click any card to view details</div>
    <div class="kanban fade-in">${cols}</div>`;
}

// ═══════════════════════════════════════════════════════════════════════
//  TEAM
// ═══════════════════════════════════════════════════════════════════════
function renderTeam(){
  if(mode==='user'){showPanel('user');return;}
  const st=getScopedTasks();
  // Normalise to lowercase so mixed-case duplicates are merged
  const uniqueEmails=[...new Set(st.map(t=>t.assignee.toLowerCase()))];
  const members=uniqueEmails.map(email=>{
    const myTasks=st.filter(t=>t.assignee.toLowerCase()===email);
    return{email,total:myTasks.length,done:myTasks.filter(t=>t.status==='Done').length,inprog:myTasks.filter(t=>t.status==='In Progress').length,overdue:myTasks.filter(isOverdue).length};
  });
  const c=document.getElementById('content');
  c.innerHTML=`
  <div class="panel-title fade-in">Team Overview</div>
  <div class="panel-sub">${members.length} active members${plantOwnerAuthenticated&&currentPlantSession?' in 🏭 '+esc(currentPlantSession.name):' across all projects'}</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px" class="fade-in">
  ${members.map(m=>{
    const pct=m.total?Math.round(m.done/m.total*100):0;
    const initials=m.email.slice(0,2).toUpperCase();
    const colors=['var(--accent)','var(--purple)','var(--green)','var(--amber)','var(--cyan)'];
    const color=colors[m.email.charCodeAt(0)%colors.length];
    return`<div class="card" style="border-top:3px solid ${color}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:44px;height:44px;border-radius:50%;background:${color}22;border:2px solid ${color}44;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:${color};flex-shrink:0">${initials}</div>
        <div><div style="font-weight:700;font-size:14px;color:var(--text)">${m.email}</div><div style="font-size:11px;color:var(--text3)">Team Member</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:8px">
          <div style="font-size:20px;font-weight:800;color:var(--accent)">${m.total}</div><div style="font-size:10px;color:var(--text3)">TOTAL</div>
        </div>
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:8px">
          <div style="font-size:20px;font-weight:800;color:var(--green)">${m.done}</div><div style="font-size:10px;color:var(--text3)">DONE</div>
        </div>
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:8px">
          <div style="font-size:20px;font-weight:800;color:var(--red)">${m.overdue}</div><div style="font-size:10px;color:var(--text3)">OVERDUE</div>
        </div>
      </div>
      <div class="progress-bar" style="margin-bottom:5px"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">${pct}% completion rate</div>
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;font-size:11px;" onclick="copyAssigneeLink('${m.email}')">🔗 Copy Task Link</button>
    </div>`;
  }).join('')}
  </div>`;
}

function addPlantGroup(){
  const name=(document.getElementById('pg-name')?.value||'').trim();
  const ownersRaw=(document.getElementById('pg-owners')?.value||'').trim();
  const password=(document.getElementById('pg-password')?.value||'').trim();
  if(!name){ toast('Plant name is required','var(--red)'); return; }
  if(!password){ toast('A login password is required for the plant owner','var(--red)'); return; }
  const owners=ownersRaw?ownersRaw.split(',').map(o=>o.trim()).filter(Boolean):[];
  const groups=getPlantGroups();
  const newPlant={id:uid(),name,owners,password,created:today()};
  groups.push(newPlant);
  savePlantGroups(groups);
  document.getElementById('pg-name').value='';
  document.getElementById('pg-owners').value='';
  document.getElementById('pg-password').value='';
  renderPgList();
  renderPlantNav();
  renderDashPlants();
  toast('🏭 Plant "'+name+'" added!');
}

function startPlantEdit(id){
  document.getElementById('pg-edit-form-'+id).style.display='block';
  document.getElementById('pg-name-display-'+id).style.display='none';
  document.getElementById('pg-owners-display-'+id).style.display='none';
}

function cancelPlantEdit(id){
  document.getElementById('pg-edit-form-'+id).style.display='none';
  document.getElementById('pg-name-display-'+id).style.display='';
  document.getElementById('pg-owners-display-'+id).style.display='';
}

function savePlantEdit(id){
  const name=(document.getElementById('pg-edit-name-'+id)?.value||'').trim();
  const ownersRaw=(document.getElementById('pg-edit-owners-'+id)?.value||'').trim();
  const newPwd=(document.getElementById('pg-edit-pwd-'+id)?.value||'').trim();
  if(!name){ toast('Plant name is required','var(--red)'); return; }
  const owners=ownersRaw?ownersRaw.split(',').map(o=>o.trim()).filter(Boolean):[];
  const groups=getPlantGroups().map(p=>{
    if(p.id!==id) return p;
    const updated={...p,name,owners};
    if(newPwd) updated.password=newPwd; // only update if a new pwd was entered
    return updated;
  });
  savePlantGroups(groups);
  renderPgList();
  renderPlantNav();
  renderDashPlants();
  toast('✅ Plant updated!');
}

function deletePlantGroup(id){
  const groups=getPlantGroups();
  const plant=groups.find(p=>p.id===id);
  if(!confirm('Delete plant "'+( plant?.name||id)+'"? This will not delete the tasks.')) return;
  savePlantGroups(groups.filter(p=>p.id!==id));
  renderPgList();
  renderPlantNav();
  if(_activePlantId===id){ _activePlantId=null; }
  renderDashPlants();
  toast('🗑 Plant deleted','var(--red)');
}


function changePlantPassword(){
  if(!plantOwnerAuthenticated||!currentPlantSession){toast('Not logged in as plant owner','var(--red)');return;}
  const cur=document.getElementById('po-pwd-current')?.value||'';
  const nw=document.getElementById('po-pwd-new')?.value||'';
  const cf=document.getElementById('po-pwd-confirm')?.value||'';
  const status=document.getElementById('po-pwd-status');
  if(cur!==currentPlantSession.password){status.style.color='var(--red)';status.textContent='❌ Current password is incorrect.';return;}
  if(nw.length<6){status.style.color='var(--red)';status.textContent='❌ New password must be at least 6 characters.';return;}
  if(nw!==cf){status.style.color='var(--red)';status.textContent='❌ Passwords do not match.';return;}
  const groups=getPlantGroups().map(p=>p.id===currentPlantSession.id?{...p,password:nw}:p);
  savePlantGroups(groups);
  currentPlantSession={...currentPlantSession,password:nw};
  status.style.color='var(--green)';
  status.textContent='✅ Password updated successfully!';
  document.getElementById('po-pwd-current').value='';
  document.getElementById('po-pwd-new').value='';
  document.getElementById('po-pwd-confirm').value='';
  toast('🔑 Plant password updated!');
}

function saveEmailSettings(){
  const clientId  = (document.getElementById('ms-client-id')?.value||'').trim();
  const tenantId  = (document.getElementById('ms-tenant-id')?.value||'').trim();
  const testEmail = (document.getElementById('ms-test-email')?.value||'').trim();
  const adminNotifyEmail = (document.getElementById('admin-notify-email')?.value||'').trim();
  const ejsService  = (document.getElementById('ejs-service-id')?.value||'').trim();
  const ejsTemplate = (document.getElementById('ejs-template-id')?.value||'').trim();
  const ejsKey      = (document.getElementById('ejs-public-key')?.value||'').trim();

  // ── Step 1: Write to localStorage ──────────────────────────────────────
  localStorage.setItem('ms_client_id',       clientId);
  localStorage.setItem('ms_tenant_id',       tenantId);
  localStorage.setItem('ms_test_email',      testEmail);
  localStorage.setItem('admin_notify_email', adminNotifyEmail);
  localStorage.setItem('ejs_service_id',     ejsService);
  localStorage.setItem('ejs_template_id',    ejsTemplate);
  localStorage.setItem('ejs_public_key',     ejsKey);

  // ── Step 2: Verify and update display ──────────────────────────────────
  const verifyId  = localStorage.getItem('ms_client_id');
  const verifyTen = localStorage.getItem('ms_tenant_id');
  console.log('[Settings] Saved Client ID:', verifyId);
  console.log('[Settings] Saved Tenant ID:', verifyTen);
  const cidStatus = document.getElementById('ms-saved-client-id-display');
  const tidStatus = document.getElementById('ms-saved-tenant-id-display');
  if(cidStatus){ cidStatus.textContent = verifyId || '❌ not saved'; cidStatus.style.color = verifyId ? 'var(--green)' : 'var(--red)'; }
  if(tidStatus){ tidStatus.textContent = verifyTen || '❌ not saved'; tidStatus.style.color = verifyTen ? 'var(--green)' : 'var(--red)'; }

  // ── Step 3: IMPORTANT — do NOT clear _msalInstances or the singleton cache.
  //    The singleton keyed by clientId::tenantId is safe to keep — if credentials
  //    changed the new key produces a fresh instance automatically on next use.
  //    Clearing would destroy the cached token and force re-login unnecessarily.
  _msalSignedIn = false; // reset local flag only; actual state comes from getAllAccounts()

  // ── Step 4: Check if already signed in with the new credentials ─────────
  const newKey = clientId && tenantId ? `${clientId}::${tenantId}` : null;
  if(newKey && _msalInstances[newKey]){
    const accounts = _msalInstances[newKey].getAllAccounts();
    if(accounts.length > 0){
      updateMsalStatusBadge('signed-in', accounts[0].username);
    } else {
      updateMsalStatusBadge('signed-out');
    }
  } else {
    updateMsalStatusBadge('signed-out');
  }

  // ── Step 5: Persist to Firestore ────────────────────────────────────────
  if(_fbReady && _db){
    _db.collection('settings').doc('msgraph').set(
      {clientId, tenantId, testEmail, adminNotifyEmail, ejsService, ejsTemplate, ejsKey},
      {merge: true}
    ).then(()=>{
      console.log('[Settings] Email config synced to Firestore ✓');
    }).catch(e => console.warn('[Settings] Firestore save error:', e));
  }

  // ── Step 6: Confirmation toast ───────────────────────────────────────────
  if(clientId && tenantId){
    const alreadyIn = newKey && _msalInstances[newKey] && _msalInstances[newKey].getAllAccounts().length > 0;
    toast(alreadyIn
      ? '✅ Settings saved — already signed in to Microsoft!'
      : '✅ Settings saved! Click "Sign In with Microsoft" to authorize.');
    const signinBtn = document.getElementById('msal-signin-btn');
    if(signinBtn && !alreadyIn){ signinBtn.style.boxShadow = '0 0 0 2px var(--green)'; }
  } else if(ejsService && ejsTemplate && ejsKey){
    toast('✅ EmailJS settings saved.');
  } else {
    toast('⚠ Settings saved — no email transport configured yet.', 'var(--amber)');
  }
}
