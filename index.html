<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Task Manager</title>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
body{font-family:Arial;margin:0}
#app{display:none;padding:20px}
#user-screen{display:block;text-align:center;margin-top:100px}
button{padding:10px 20px;font-size:16px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="user-screen" style="display:block; text-align:center; margin-top:100px;">
  <h2>Login Required</h2>
  <button onclick="login()" class="btn btn-primary">Login with Microsoft</button>
</div>

<!-- MAIN APP (HIDDEN BY DEFAULT) -->
<div id="app" style="display:none;">

<!-- LOGIN SCREEN -->
<div id="user-screen">
  <h2>Login Required</h2>
  <button onclick="login()">Login with Microsoft</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <h1>Dashboard</h1>
  <p>Welcome to your Task Manager App</p>
  <button onclick="logout()">Logout</button>
</div>

<script>
const msalConfig = {
    auth: {
        clientId: "YOUR_CLIENT_ID",
        redirectUri: window.location.href
    }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

function showApp() {
    document.getElementById("app").style.display = "block";
    document.getElementById("user-screen").style.display = "none";
}

function showLogin() {
    document.getElementById("app").style.display = "none";
    document.getElementById("user-screen").style.display = "block";
}

window.onload = function () {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
        showApp();
    } else {
        showLogin();
    }
};

function login() {
    msalInstance.loginPopup()
        .then(() => {
            showApp();
        })
        .catch(err => console.error(err));
}

function logout() {
    msalInstance.logoutPopup()
        .then(() => {
            showLogin();
        });
}
</script>

</div>

</body>
</html>
