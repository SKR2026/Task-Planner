<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Project Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #08090d;
    --surface:   #10121a;
    --card:      #181c28;
    --card2:     #1e2335;
    --border:    #272d42;
    --border2:   #323a55;
    --accent:    #5b8dee;
    --accent2:   #3d6dd4;
    --green:     #34d399;
    --amber:     #fbbf24;
    --red:       #f87171;
    --purple:    #a78bfa;
    --cyan:      #22d3ee;
    --text:      #e8ecf4;
    --text2:     #9aa5c0;
    --text3:     #5c6680;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius:    12px;
    --radius-lg: 18px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
  }
  /* ─── scrollbar ─── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ─── layout ─── */
  #app { display: flex; min-height: 100vh; }
  #sidebar {
    width: 240px; min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0;
  }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  #content { padding: 28px; flex: 1; overflow-y: auto; }

  /* ─── sidebar items ─── */
  .logo {
    padding: 22px 20px 18px; border-bottom: 1px solid var(--border);
    font-family: var(--font-head); font-weight: 800; font-size: 20px;
    color: var(--accent); letter-spacing: -0.5px;
  }
  .logo span { display: block; font-size: 10px; font-weight: 400; color: var(--text3); margin-top: 2px; font-family: var(--font-body); letter-spacing: 1px; text-transform: uppercase; }
  .nav-section { padding: 16px 12px 8px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 16px;
    margin: 1px 8px; border-radius: 9px; cursor: pointer; color: var(--text2);
    font-size: 13.5px; font-weight: 500; transition: all .15s; position: relative;
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: rgba(91,141,238,.12); color: var(--accent); }
  .nav-item.active::before { content:''; position:absolute; left:0; top:20%; height:60%; width:3px; background:var(--accent); border-radius:0 3px 3px 0; }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--red); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
  .sidebar-bottom { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }

  /* ─── cards & panels ─── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-sm { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .panel-title { font-family: var(--font-head); font-weight: 700; font-size: 22px; color: var(--text); margin-bottom: 4px; }
  .panel-sub { color: var(--text3); font-size: 13px; margin-bottom: 24px; }

  /* ─── stats grid ─── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden; }
  .stat-card::after { content:''; position:absolute; inset:0; opacity:.04; background: var(--c); pointer-events:none; }
  .stat-value { font-family: var(--font-head); font-size: 32px; font-weight: 800; color: var(--c); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .8px; }
  .stat-icon { position: absolute; right: 14px; top: 14px; font-size: 22px; opacity: .3; }

  /* ─── badges ─── */
  .badge { display: inline-flex; align-items: center; border-radius: 6px; padding: 2px 9px; font-size: 11px; font-weight: 700; letter-spacing: .4px; }
  .badge-high   { background: rgba(248,113,113,.15); color: #f87171; border: 1px solid rgba(248,113,113,.25); }
  .badge-medium { background: rgba(251,191,36,.13);  color: #fbbf24; border: 1px solid rgba(251,191,36,.22); }
  .badge-low    { background: rgba(52,211,153,.13);  color: #34d399; border: 1px solid rgba(52,211,153,.22); }
  .badge-todo   { background: rgba(156,163,176,.1);  color: #9ca3af; border: 1px solid rgba(156,163,176,.2); }
  .badge-inprog { background: rgba(91,141,238,.15);  color: #5b8dee; border: 1px solid rgba(91,141,238,.25); }
  .badge-review { background: rgba(167,139,250,.15); color: #a78bfa; border: 1px solid rgba(167,139,250,.25); }
  .badge-done   { background: rgba(52,211,153,.13);  color: #34d399; border: 1px solid rgba(52,211,153,.22); }
  .badge-overdue{ background: rgba(248,113,113,.2);  color: #f87171; border: 1px solid #f8717144; }

  /* ─── buttons ─── */
  .btn { display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: 9px; font-family: var(--font-body); font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; padding: 10px 20px; font-size: 14px; box-shadow: 0 0 20px rgba(91,141,238,.3); }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); padding: 8px 16px; font-size: 13px; }
  .btn-ghost:hover { background: var(--card); color: var(--text); }
  .btn-danger { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.2); padding: 7px 14px; font-size: 12px; }
  .btn-success { background: rgba(52,211,153,.12); color: var(--green); border: 1px solid rgba(52,211,153,.2); padding: 7px 14px; font-size: 12px; }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }
  .btn-icon { background: var(--card); border: 1px solid var(--border); color: var(--text2); padding: 8px; border-radius: 8px; cursor:pointer; font-size:14px; transition: all .15s; }
  .btn-icon:hover { background: var(--card2); color: var(--text); }

  /* ─── forms ─── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .6px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 9px; padding: 10px 13px; color: var(--text); font-family: var(--font-body);
    font-size: 14px; outline: none; transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--card); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ─── modal ─── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg);
    width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; padding: 28px;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-title { font-family: var(--font-head); font-weight: 700; font-size: 18px; }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; padding: 4px; line-height:1; }
  .modal-close:hover { color: var(--text); }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

  /* ─── task rows ─── */
  .task-row {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 18px; display: flex; align-items: flex-start; gap: 14px;
    transition: all .15s; border-left: 3px solid var(--lc, var(--border));
    cursor: pointer; margin-bottom: 8px;
  }
  .task-row:hover { background: var(--card2); border-color: var(--border2); }
  .task-row-body { flex: 1; min-width: 0; }
  .task-title { font-weight: 600; font-size: 14.5px; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { font-size: 12px; color: var(--text3); display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* ─── kanban ─── */
  .kanban { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .kanban-col-header { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
  .kanban-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .kanban-col-title { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .8px; }
  .kanban-count { margin-left: auto; background: var(--card2); border-radius: 10px; padding: 1px 8px; font-size: 11px; font-weight: 700; color: var(--text2); }
  .kanban-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 13px; margin-bottom: 9px; cursor: pointer; transition: all .15s;
    border-left: 3px solid var(--lc, var(--border));
  }
  .kanban-card:hover { background: var(--card2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.3); }
  .kanban-card-title { font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 7px; }
  .kanban-card-meta { font-size: 11px; color: var(--text3); }

  /* ─── drawer (task detail) ─── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; }
  .drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 640px;
    background: var(--surface); border-left: 1px solid var(--border2); z-index: 101;
    overflow-y: auto; padding: 28px; animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { transform: translateX(60px); opacity:0; } to { transform: none; opacity:1; } }
  .drawer-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }

  /* ─── reply thread ─── */
  .reply-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
  .reply-author { font-size: 12px; font-weight: 700; color: var(--accent); }
  .reply-time { font-size: 11px; color: var(--text3); margin-left: 8px; }
  .reply-text { font-size: 13.5px; color: var(--text2); margin-top: 5px; line-height: 1.6; }
  .reply-attachments { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; }
  .attach-chip { background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.2); border-radius: 6px; padding: 3px 9px; font-size: 11px; color: var(--purple); display: flex; align-items: center; gap: 4px; }

  /* ─── charts ─── */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 22px; }
  .chart-wrap { position: relative; height: 180px; }

  /* ─── progress bar ─── */
  .progress-bar { background: var(--bg); border-radius: 6px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 6px; transition: width .5s ease; }

  /* ─── table ─── */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .7px; padding: 8px 0; border-bottom: 1px solid var(--border); text-align: left; }
  .tbl td { padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,.03); font-size: 13px; color: var(--text2); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }

  /* ─── reminder panel ─── */
  .reminder-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,.03); }
  .reminder-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

  /* ─── user token screen ─── */
  #user-screen { max-width: 520px; margin: 60px auto; text-align: center; }
  .token-box { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 32px; margin-top: 28px; }
  .demo-tokens { margin-top: 18px; background: var(--bg); border-radius: var(--radius); padding: 14px; text-align: left; }
  .demo-token-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
  .token-val { font-family: monospace; font-size: 12px; color: var(--accent); background: rgba(91,141,238,.08); border: 1px solid rgba(91,141,238,.15); border-radius: 5px; padding: 2px 8px; cursor: pointer; }
  .token-val:hover { background: rgba(91,141,238,.18); }

  /* ─── empty state ─── */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ─── toast ─── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--green); color: #000; padding: 12px 22px; border-radius: 10px;
    font-weight: 600; font-size: 14px; z-index: 9999; transition: transform .3s ease; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── misc ─── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .section-head { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .link-chip { background: rgba(91,141,238,.08); border: 1px solid rgba(91,141,238,.18); border-radius: 8px; padding: 8px 13px; font-size: 12px; color: var(--accent); font-family: monospace; word-break: break-all; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .status-btn { padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
  .status-btn:hover, .status-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(91,141,238,.08); }

  /* ─── switch toggle ─── */
  .switch { position: relative; width: 36px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-slider { position: absolute; inset: 0; background: var(--border2); border-radius: 20px; cursor: pointer; transition: .2s; }
  .switch-slider::before { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#fff; left:3px; top:3px; transition:.2s; }
  .switch input:checked + .switch-slider { background: var(--accent); }
  .switch input:checked + .switch-slider::before { transform: translateX(16px); }

  /* ─── animations ─── */
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .fade-in { animation: fadeIn .25s ease; }

  /* ─── file upload ─── */
  .file-drop { border: 2px dashed var(--border2); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--text3); font-size: 13px; cursor: pointer; transition: all .15s; }
  .file-drop:hover { border-color: var(--accent); color: var(--accent); background: rgba(91,141,238,.04); }

  /* ─── responsive ─── */
  @media (max-width: 900px) {
    #sidebar { width: 60px; }
    .nav-item span, .nav-section, .logo span, .sidebar-mode-label { display: none; }
    .logo { padding: 18px 14px; font-size: 0; }
    .logo::before { content: '⬡'; font-size: 20px; color: var(--accent); }
    .kanban { grid-template-columns: 1fr 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    #content { padding: 16px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .kanban { grid-template-columns: 1fr; }
    .drawer { max-width: 100%; }
  }
</style>
</head>
<body>

<div id="toast">✓ Action completed</div>

<div id="app">
  <!-- ═══ SIDEBAR ═══ -->
  <nav id="sidebar">
    <div class="logo">⬡ TaskFlow<span>Project Manager v1.0</span></div>

    <div id="admin-nav" class="fade-in">
      <div class="nav-section">Main</div>
      <div class="nav-item active" onclick="showPanel('dashboard')"><span class="nav-icon">📊</span><span>Dashboard</span></div>
      <div class="nav-item" onclick="showPanel('tasks')"><span class="nav-icon">📋</span><span>All Tasks</span><span id="overdue-badge" class="nav-badge" style="display:none">!</span></div>
      <div class="nav-item" onclick="showPanel('kanban')"><span class="nav-icon">🗂</span><span>Kanban Board</span></div>
      <div class="nav-section">Management</div>
      <div class="nav-item" onclick="showPanel('reminders')"><span class="nav-icon">🔔</span><span>Reminders</span></div>
      <div class="nav-item" onclick="showPanel('team')"><span class="nav-icon">👥</span><span>Team</span></div>
      <div class="nav-section">Settings</div>
      <div class="nav-item" onclick="showPanel('settings')"><span class="nav-icon">⚙️</span><span>Settings</span></div>
    </div>

    <div class="sidebar-bottom">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.8px" class="sidebar-mode-label">View Mode</div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-primary btn-sm" id="btn-admin-mode" onclick="setMode('admin')" style="flex:1;justify-content:center;">Admin</button>
        <button class="btn btn-ghost btn-sm" id="btn-user-mode" onclick="setMode('user')" style="flex:1;justify-content:center;">User</button>
      </div>
    </div>
  </nav>

  <!-- ═══ MAIN ═══ -->
  <div id="main">
    <!-- topbar -->
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0;"></div>
        <div id="topbar-title" style="font-family:var(--font-head);font-weight:700;font-size:16px;color:var(--text);">Dashboard</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;color:var(--text3);" id="current-date"></span>
        <button class="btn btn-primary" id="btn-new-task" onclick="openNewTaskModal()" style="display:none;">+ New Task</button>
        <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;">A</div>
      </div>
    </div>

    <!-- content area -->
    <div id="content">
      <!-- panels injected here -->
    </div>
  </div>
</div>

<script>
// ── helpers ──────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,9);
const today = () => new Date().toISOString().slice(0,10);
const fmt = d => new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const fmtTime = d => new Date(d).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

// ── initial data ──────────────────────────────────────────────────────
const SEED = [

// ── state ─────────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('tf_tasks') || 'null') || SEED;
let mode = 'admin'; // 'admin' | 'user'
let currentPanel = 'dashboard';
let activeDrawerTask = null;
let editTaskId = null;
let pendingFiles = []; // file objects waiting to attach
let chartInstances = {};

function saveTasks() { localStorage.setItem('tf_tasks',JSON.stringify(tasks)); }
function getTask(id) { return tasks.find(t=>t.id===id); }
function updateTask(t) { tasks = tasks.map(x=>x.id===t.id?t:x); saveTasks(); }

// priority / status helpers
const PRIO_COLOR = {High:'var(--red)',Medium:'var(--amber)',Low:'var(--green)'};
const STATUS_COLOR = {'To Do':'var(--text3)','In Progress':'var(--accent)','Review':'var(--purple)','Done':'var(--green)'};
const STATUSES = ['To Do','In Progress','Review','Done'];
const PRIOS = ['High','Medium','Low'];

function statusBadgeClass(s){return{' To Do':'badge-todo','In Progress':'badge-inprog','Review':'badge-review','Done':'badge-done'}[s]||'badge-todo';}
function prioBadgeClass(p){return{High:'badge-high',Medium:'badge-medium',Low:'badge-low'}[p]||'badge-low';}

function isOverdue(t){ return t.due<today()&&t.status!=='Done'; }

// ── toast ──────────────────────────────────────────────────────────────
function toast(msg,color='var(--green)'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=color;
  el.style.color=color===('var(--red)')?'#fff':'#000';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}

// ── date display ───────────────────────────────────────────────────────
document.getElementById('current-date').textContent =
  new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});

// ── overdue badge ─────────────────────────────────────────────────────
function refreshOverdueBadge(){
  const n=tasks.filter(t=>isOverdue(t)).length;
  const b=document.getElementById('overdue-badge');
  b.style.display=n?'inline':'none'; b.textContent=n;
}

// ═══════════════════════════════════════════════════════════════════════
function setMode(m){
  mode=m;
  document.getElementById('btn-admin-mode').className='btn btn-'+(m==='admin'?'primary':'ghost')+' btn-sm';
  document.getElementById('btn-user-mode').className='btn btn-'+(m==='user'?'primary':'ghost')+' btn-sm';
  document.getElementById('admin-nav').style.display=m==='admin'?'block':'none';
  document.getElementById('btn-new-task').style.display=m==='admin'?'flex':'none';
  if(m==='user'){ showPanel('user'); }
  else { showPanel('dashboard'); }
}

//  PANEL ROUTER
// ═══════════════════════════════════════════════════════════════════════
function showPanel(name){
  currentPanel=name;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const hit=document.querySelector(`.nav-item[onclick*="${name}"]`);
  if(hit) hit.classList.add('active');
  document.getElementById('btn-new-task').style.display=(mode==='admin'&&name!=='user')?'flex':'none';
  const panels={dashboard:renderDashboard,tasks:renderTasks,kanban:renderKanban,reminders:renderReminders,team:renderTeam,settings:renderSettings,user:renderUser};
  const fn=panels[name];
  if(fn){ document.getElementById('content').innerHTML=''; fn(); }
  const titles={dashboard:'Dashboard',tasks:'All Tasks',kanban:'Kanban Board',reminders:'Reminders',team:'Team',settings:'Settings',user:'My Tasks'};
  document.getElementById('topbar-title').textContent=titles[name]||name;
  refreshOverdueBadge();
}

      <div class="stat-label">In Progress</div>
    </div>

      <div class="stat-value">${review}</div>
      <div class="stat-label">In Review</div>
    </div>

      <div class="stat-icon">✅</div>
      <div class="stat-value">${done}</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-card" style="--c:var(--red)">
      <div class="stat-icon">🚨</div>
      <div class="stat-value">${overdue}</div>
      <div class="stat-label">Overdue</div>
    </div>
    <div class="stat-card" style="--c:var(--cyan)">
      <div class="stat-icon">📈</div>
      <div class="stat-value">${rate}%</div>
      <div class="stat-label">Completion Rate</div>

  </div>

  <div class="charts-grid fade-in">
    <div class="card"><div class="section-head" style="margin-bottom:12px">By Status</div><div class="chart-wrap"><canvas id="ch-status"></canvas></div></div>
    <div class="card"><div class="section-head" style="margin-bottom:12px">By Priority</div><div class="chart-wrap"><canvas id="ch-prio"></canvas></div></div>
    <div class="card"><div class="section-head" style="margin-bottom:12px">Weekly Trend</div><div class="chart-wrap"><canvas id="ch-trend"></canvas></div></div>
  </div>

  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:14px" class="fade-in">
    <div class="card">
      <div class="section-head" style="margin-bottom:14px">Team Workload</div>
      <table class="tbl" id="team-tbl"></table>

    <div class="card">
      <div class="section-head" style="margin-bottom:14px">Upcoming Deadlines</div>
      <div id="upcoming-list"></div>
    </div>
  </div>`;

  // charts
  setTimeout(()=>{
    const statusData={
      labels:STATUSES,
      datasets:[{data:STATUSES.map(s=>tasks.filter(t=>t.status===s).length),
      backgroundColor:['rgba(156,163,176,.7)','rgba(91,141,238,.7)','rgba(167,139,250,.7)','rgba(52,211,153,.7)'],
      borderWidth:0,hoverOffset:4}]};
    destroyChart('ch-status');
    chartInstances['ch-status']=new Chart(document.getElementById('ch-status'),{type:'doughnut',data:statusData,options:{plugins:{legend:{position:'right',labels:{color:'#9aa5c0',boxWidth:10,font:{size:11}}}},cutout:'65%',maintainAspectRatio:false}});

    const prioData={
      labels:PRIOS,
      datasets:[{data:PRIOS.map(p=>tasks.filter(t=>t.priority===p).length),

      borderWidth:0}]};
    destroyChart('ch-prio');
    chartInstances['ch-prio']=new Chart(document.getElementById('ch-prio'),{type:'bar',data:prioData,options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9aa5c0',font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#9aa5c0',font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}}},maintainAspectRatio:false}});

    const weeks=['5w ago','4w ago','3w ago','2w ago','Last wk','This wk'];
    const trendVals=[2,4,3,6,5,done||1];
    destroyChart('ch-trend');
    chartInstances['ch-trend']=new Chart(document.getElementById('ch-trend'),{type:'line',data:{labels:weeks,datasets:[{data:trendVals,borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.08)',tension:.4,fill:true,pointBackgroundColor:'#34d399',pointRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9aa5c0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#9aa5c0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}}},maintainAspectRatio:false}});

      </div>`).join(''):'<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">All tasks done! 🎉</div>';
  },50);

function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}

// ═══════════════════════════════════════════════════════════════════════
let taskFilters={status:'All',priority:'All',search:''};

function renderTasks(){
  const c=document.getElementById('content');
  c.innerHTML=`
  <div class="panel-title fade-in">All Tasks</div>
  <div class="panel-sub">${tasks.length} total tasks across all team members</div>
  <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap" class="fade-in">
    <input id="tf-search" class="form-input" style="max-width:280px;padding:9px 13px" placeholder="🔍  Search tasks or members…" value="${taskFilters.search}" oninput="taskFilters.search=this.value;renderTaskRows()"/>
    <select id="tf-status" class="form-select" style="max-width:160px" onchange="taskFilters.status=this.value;renderTaskRows()">
      <option>All</option>${STATUSES.map(s=>`<option${taskFilters.status===s?' selected':''}>${s}</option>`).join('')}
    </select>
    <select id="tf-prio" class="form-select" style="max-width:140px" onchange="taskFilters.priority=this.value;renderTaskRows()">
      <option>All</option>${PRIOS.map(p=>`<option${taskFilters.priority===p?' selected':''}>${p}</option>`).join('')}
    </select>
    <button class="btn btn-ghost btn-sm" onclick="taskFilters={status:'All',priority:'All',search:''};renderTasks()">Reset</button>
  </div>
  <div id="task-rows" class="fade-in"></div>`;
  renderTaskRows();
}

function renderTaskRows(){
  const filtered=tasks.filter(t=>{
    const ss=taskFilters.status==='All'||t.status===taskFilters.status;
    const sp=taskFilters.priority==='All'||t.priority===taskFilters.priority;
    const sq=!taskFilters.search||t.title.toLowerCase().includes(taskFilters.search.toLowerCase())||t.assignee.toLowerCase().includes(taskFilters.search.toLowerCase());
    return ss&&sp&&sq;
  });
  const el=document.getElementById('task-rows');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>No tasks match your filters</div></div>';return;}
  el.innerHTML=filtered.map(t=>`
    <div class="task-row" style="--lc:${PRIO_COLOR[t.priority]}" onclick="openDrawer('${t.id}')">
      <div class="task-row-body">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <span>👤 ${t.assignee}</span>
          <span>📅 <span style="color:${isOverdue(t)?'var(--red)':'inherit'}">${fmt(t.due)}</span></span>
          ${t.replies.length?`<span>💬 ${t.replies.length}</span>`:''}
          ${t.attachments.length?`<span>📎 ${t.attachments.length}</span>`:''}
          ${t.reminder!=='none'?`<span>🔔 ${t.reminder}</span>`:''}
        </div>
      </div>
      <div class="task-actions" onclick="event.stopPropagation()">
        <span class="badge ${prioBadgeClass(t.priority)}">${t.priority}</span>
        <span class="badge ${statusBadgeClass(t.status)}">${t.status}</span>
        ${isOverdue(t)?'<span class="badge badge-overdue">Overdue</span>':''}
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${t.id}')">✏ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">🗑</button>
      </div>
    </div>`).join('');
}

function deleteTask(id){
  if(!confirm('Delete this task permanently?'))return;
  tasks=tasks.filter(t=>t.id!==id);
  saveTasks(); renderTaskRows(); refreshOverdueBadge();
  toast('Task deleted','var(--red)');
}

function renderTeam(){
  const members=[...new Set(tasks.map(t=>t.assignee))].map(email=>{
    const myTasks=tasks.filter(t=>t.assignee===email);
    return{email,total:myTasks.length,done:myTasks.filter(t=>t.status==='Done').length,inprog:myTasks.filter(t=>t.status==='In Progress').length,overdue:myTasks.filter(isOverdue).length};
  });
  const c=document.getElementById('content');
  c.innerHTML=`
  <div class="panel-title fade-in">Team Overview</div>
  <div class="panel-sub">${members.length} active members across all projects</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px" class="fade-in">
  ${members.map(m=>{
    const pct=m.total?Math.round(m.done/m.total*100):0;
    const initials=m.email.slice(0,2).toUpperCase();
    const colors=['var(--accent)','var(--purple)','var(--green)','var(--amber)','var(--cyan)'];
    const color=colors[m.email.charCodeAt(0)%colors.length];
    return`<div class="card" style="border-top:3px solid ${color}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:44px;height:44px;border-radius:50%;background:${color}22;border:2px solid ${color}44;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:${color};flex-shrink:0">${initials}</div>
        <div><div style="font-weight:700;font-size:14px;color:var(--text)">${m.email}</div><div style="font-size:11px;color:var(--text3)">Team Member</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:8px">
          <div style="font-size:20px;font-weight:800;color:var(--accent)">${m.total}</div><div style="font-size:10px;color:var(--text3)">TOTAL</div>
        </div>
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:8px">
          <div style="font-size:20px;font-weight:800;color:var(--green)">${m.done}</div><div style="font-size:10px;color:var(--text3)">DONE</div>
        </div>
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:8px">
          <div style="font-size:20px;font-weight:800;color:var(--red)">${m.overdue}</div><div style="font-size:10px;color:var(--text3)">OVERDUE</div>
        </div>
      </div>
      <div class="progress-bar" style="margin-bottom:5px"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <div style="font-size:11px;color:var(--text3)">${pct}% completion rate</div>
    </div>`;
  }).join('')}
  </div>`;
}

function saveEmailSettings(){
  localStorage.setItem('ejs_service',document.getElementById('ejs-service').value);
  localStorage.setItem('ejs_template',document.getElementById('ejs-template').value);
  localStorage.setItem('ejs_key',document.getElementById('ejs-key').value);
  toast('Email settings saved!');
}

function exportData(){
  const blob=new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='taskflow-backup.json'; a.click();
  toast('Tasks exported!');
}

function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const fr=new FileReader(); fr.onload=ev=>{
      try{tasks=JSON.parse(ev.target.result);saveTasks();renderSettings();toast('Tasks imported!');}catch{toast('Invalid JSON file','var(--red)');}
    };fr.readAsText(e.target.files[0]);
  };inp.click();
}

function resetData(){
  if(!confirm('Reset all tasks to demo data? This cannot be undone.'))return;
  tasks=JSON.parse(JSON.stringify(SEED)).map(t=>({...t,id:uid(),token:uid()}));
  saveTasks(); showPanel('dashboard'); toast('Reset to demo data');
}

let userTask=null;

function renderUser(){

      <div class="form-group">
        <label class="form-label">Task Token</label>
        <input id="token-input" class="form-input" placeholder="e.g. abc12xy" style="text-align:center;font-family:monospace;font-size:16px;letter-spacing:2px"/>

function lookupToken(){
  const tok=document.getElementById('token-input').value.trim();
  const found=tasks.find(t=>t.token===tok);
  const err=document.getElementById('token-error');
  if(!found){err.style.display='block';return;}
  err.style.display='none';
  userTask=found;
  renderUser();
}

function renderUserTask(c){
  const t=userTask;
  const overdue=isOverdue(t);
  c.innerHTML=`
  <div class="fade-in">
    <div style="margin-bottom:16px"><button class="btn btn-ghost btn-sm" onclick="userTask=null;renderUser()">← Back</button></div>
    <div style="max-width:700px">

        <div style="flex:1;min-width:200px">
          <div style="font-family:var(--font-head);font-weight:700;font-size:22px;color:var(--text);margin-bottom:8px">${t.title}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span class="badge ${prioBadgeClass(t.priority)}">${t.priority}</span>
            <span class="badge ${statusBadgeClass(t.status)}">${t.status}</span>
            ${overdue?'<span class="badge badge-overdue">Overdue</span>':''}
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:14px;padding:16px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px">
          ${[['Assigned To',t.assignee],['Due Date',fmt(t.due)],['Created',fmt(t.created)],['Reminder',t.reminder]].map(([k,v])=>`
          <div><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px">${k}</div><div style="font-size:13px;color:var(--text)">${v}</div></div>`).join('')}
        </div>
      </div>

      ${t.desc?`<div class="card" style="margin-bottom:14px;padding:16px"><div class="section-head" style="margin-bottom:8px">Description</div><div style="font-size:14px;color:var(--text2);line-height:1.7">${t.desc}</div></div>`:''}

      ${t.attachments.length?`
      <div class="card" style="margin-bottom:14px;padding:16px">
        <div class="section-head" style="margin-bottom:10px">📎 Task Attachments (${t.attachments.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:7px">
          ${t.attachments.map(a=>`<div class="attach-chip">📄 ${a.name} <span style="color:var(--text3)">(${(a.size/1024).toFixed(0)}KB)</span></div>`).join('')}
        </div>
      </div>`:''}

      <div class="card" style="margin-bottom:14px;padding:16px">
        <div class="section-head" style="margin-bottom:12px">💬 Activity & Replies (${t.replies.length})</div>
        <div id="user-replies">
          ${t.replies.length?t.replies.map(r=>`
          <div class="reply-item">
            <div><span class="reply-author">${r.author}</span><span class="reply-time">${fmtTime(r.time)}</span></div>
            ${r.text?`<div class="reply-text">${r.text}</div>`:''}
            ${r.attachments.length?`<div class="reply-attachments">${r.attachments.map(a=>`<div class="attach-chip">📎 ${a.name}</div>`).join('')}</div>`:''}
          </div>`).join(''):'<div style="color:var(--text3);font-size:13px">No replies yet. Be the first to update!</div>'}
        </div>
      </div>

      <div class="card" style="padding:16px">
        <div class="section-head" style="margin-bottom:12px">✏ Add Reply / Update</div>
        <div class="form-group"><textarea id="user-reply-text" class="form-textarea" rows="3" placeholder="Type your update, progress note, or question here…"></textarea></div>
        <div style="margin-bottom:12px">
          <div class="file-drop" onclick="document.getElementById('user-file-input').click()">
            📎 Click to attach evidence files (images, PDFs, screenshots)

          <input type="file" id="user-file-input" multiple style="display:none" onchange="handleUserFiles(this)"/>
          <div id="user-file-list" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px"></div>
        </div>
        <button class="btn btn-primary" onclick="submitUserReply()">Send Reply →</button>
      </div>
    </div>
  </div>`;
  pendingFiles=[];
}

function handleUserFiles(input){
  const files=Array.from(input.files);
  pendingFiles=[...pendingFiles,...files];
  document.getElementById('user-file-list').innerHTML=pendingFiles.map((f,i)=>
    `<div class="attach-chip">📎 ${f.name} <span style="cursor:pointer;color:var(--red);margin-left:4px" onclick="removePendingFile(${i})">✕</span></div>`
  ).join('');
}

function removePendingFile(i){pendingFiles.splice(i,1);handleUserFiles({files:[]});}

function submitUserReply(){
  const text=document.getElementById('user-reply-text').value.trim();
  if(!text&&pendingFiles.length===0){toast('Please write a reply or attach a file','var(--amber)');return;}
  const reply={
    id:uid(),
    author:userTask.assignee,
    text,
    time:new Date().toISOString(),
    attachments:pendingFiles.map(f=>({name:f.name,size:f.size,type:f.type}))
  };
  userTask={...userTask,replies:[...userTask.replies,reply]};
  updateTask(userTask);
  pendingFiles=[];
  toast('Reply submitted successfully!');
  renderUserTask(document.getElementById('content'));
}

function openDrawer(id){
  activeDrawerTask=getTask(id);
  const overlay=document.createElement('div');
  overlay.className='drawer-overlay'; overlay.id='drawer-overlay';
  overlay.onclick=closeDrawer;
  const drawer=document.createElement('div');
  drawer.className='drawer'; drawer.id='task-drawer';
  document.body.appendChild(overlay);
  document.body.appendChild(drawer);
  renderDrawerContent();
}

function closeDrawer(){
  document.getElementById('drawer-overlay')?.remove();
  document.getElementById('task-drawer')?.remove();
  activeDrawerTask=null;
  // refresh current panel
  if(currentPanel==='tasks')renderTaskRows();
  else if(currentPanel==='kanban')renderKanban();
  else if(currentPanel==='dashboard')renderDashboard();
}

function renderDrawerContent(){
  const t=activeDrawerTask;

  if(!drawer)return;
  drawer.innerHTML=`
  <div class="drawer-header">

      <div style="font-family:var(--font-head);font-weight:700;font-size:19px;color:var(--text);margin-bottom:6px">${t.title}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="badge ${prioBadgeClass(t.priority)}">${t.priority}</span>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${[['Assigned To',t.assignee],['Due Date',fmt(t.due)],['Created',fmt(t.created)],['Reminder','🔔 '+t.reminder]].map(([k,v])=>`
      <div><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px">${k}</div><div style="font-size:13px;color:var(--text)">${v}</div></div>`).join('')}

  <div style="margin-bottom:14px">
    <div class="section-head" style="margin-bottom:8px">Change Status</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">

    <div class="section-head" style="margin-bottom:10px">💬 Replies (${t.replies.length})</div>
    <div id="drawer-replies">
      ${t.replies.map(r=>`
      <div class="reply-item">

      <div id="drawer-file-list" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:5px"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="submitDrawerReply()">Send Reply</button>
  </div>

    <div style="font-size:11px;color:var(--text3)">Share this link with the assignee. They can view the task and reply without an account.</div>

function changeDrawerStatus(s){
  activeDrawerTask={...activeDrawerTask,status:s};
  updateTask(activeDrawerTask);
  renderDrawerContent();
  refreshOverdueBadge();
}

function handleDrawerFiles(input){
  const files=Array.from(input.files);
  pendingFiles=[...pendingFiles,...files];
  document.getElementById('drawer-file-list').innerHTML=pendingFiles.map(f=>`<div class="attach-chip">📎 ${f.name}</div>`).join('');
}

function submitDrawerReply(){
  const text=document.getElementById('drawer-reply-text').value.trim();
  if(!text&&pendingFiles.length===0)return;
  const reply={id:uid(),author:'admin@company.com',text,time:new Date().toISOString(),attachments:pendingFiles.map(f=>({name:f.name,size:f.size}))};
  activeDrawerTask={...activeDrawerTask,replies:[...activeDrawerTask.replies,reply]};
  updateTask(activeDrawerTask);
  pendingFiles=[];
  toast('Reply sent!');
  renderDrawerContent();
}

function copyLink(token){
  const url=window.location.href.split('?')[0]+'?token='+token;
  navigator.clipboard.writeText(url).then(()=>toast('Link copied to clipboard!'));
}

    <div class="form-group"><label class="form-label">Assign To (Email) *</label><input id="tm-assignee" class="form-input" type="email" value="${t?t.assignee:''}" placeholder="user@company.com"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Priority</label>
        <select id="tm-priority" class="form-select">${PRIOS.map(p=>`<option${t&&t.priority===p?' selected':''}>${p}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Status</label>
        <select id="tm-status" class="form-select">${STATUSES.map(s=>`<option${t&&t.status===s?' selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Due Date *</label><input id="tm-due" class="form-input" type="date" value="${t?t.due:today()}"/></div>
      <div class="form-group"><label class="form-label">Reminder Frequency</label>
        <select id="tm-reminder" class="form-select">
          <option value="none"${t&&t.reminder==='none'?' selected':''}>No Reminder</option>
          <option value="daily"${t&&t.reminder==='daily'?' selected':''}>Daily</option>
          <option value="weekly"${t&&t.reminder==='weekly'?' selected':''}>Weekly</option>
          <option value="3days"${t&&t.reminder==='3days'?' selected':''}>Every 3 Days</option>
          <option value="on_due"${t&&t.reminder==='on_due'?' selected':''}>On Due Date Only</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Tags (comma-separated)</label><input id="tm-tags" class="form-input" value="${t?t.tags.join(', '):''}" placeholder="design, frontend, urgent"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">${t?'Update Task':'Create & Assign Task'}</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

function closeTaskModal(){ document.getElementById('task-modal-overlay')?.remove(); }

function saveTask(){
  const title=document.getElementById('tm-title').value.trim();
  const assignee=document.getElementById('tm-assignee').value.trim();
  const due=document.getElementById('tm-due').value;
  if(!title||!assignee||!due){toast('Title, email & due date are required','var(--red)');return;}
  const tags=document.getElementById('tm-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(editTaskId){
    const t=getTask(editTaskId);
    updateTask({...t,title,desc:document.getElementById('tm-desc').value,assignee,priority:document.getElementById('tm-priority').value,status:document.getElementById('tm-status').value,due,reminder:document.getElementById('tm-reminder').value,tags});
    toast('Task updated!');
  } else {
    const nt={id:uid(),title,desc:document.getElementById('tm-desc').value,assignee,priority:document.getElementById('tm-priority').value,status:document.getElementById('tm-status').value,due,created:today(),token:uid(),replies:[],attachments:[],reminder:document.getElementById('tm-reminder').value,tags};
    tasks=[nt,...tasks]; saveTasks();
    toast('Task created & assigned!');
  }
  closeTaskModal(); refreshOverdueBadge();
  showPanel(currentPanel);
}

// ═══════════════════════════════════════════════════════════════════════
//  DEEP LINK — token in URL
// ═══════════════════════════════════════════════════════════════════════
function checkUrlToken(){
  const params=new URLSearchParams(window.location.search);
  const token=params.get('token');
  if(token){
    const found=tasks.find(t=>t.token===token);
    if(found){
      setMode('user');
      userTask=found;
      renderUser();
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('btn-new-task').style.display='flex';
showPanel('dashboard');
checkUrlToken();
</script>
</body>
</html>
